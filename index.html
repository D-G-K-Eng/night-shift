<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIGHT SHIFT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
'use strict';

// ─── Audio Engine (Hammerz) ────────────────────────────────────────────────
// Synthwave procedural audio. All Web Audio API — no samples.
//
// Public API (matches Viv's stubs exactly):
//   Audio.init()                    — call on first user gesture
//   Audio.setEngineSpeed(0-1)       — call every frame
//   Audio.playPickup()              — fare picked up
//   Audio.playDropoff(earnings)     — fare dropped off, earnings = $ amount
//   Audio.setCopSiren(wantedLevel)  — 0-3, 0 = off
//   Audio.startAmbience()           — call once on game start
// ──────────────────────────────────────────────────────────────────────────

const Audio = (() => {
  let ctx = null;

  // Master output gain
  let masterGain = null;

  // ── Engine sound ────────────────────────────────────────────────────────
  // Two detuned oscillators + filter, frequency mapped to speed.
  let engineOsc1 = null, engineOsc2 = null;
  let engineFilter = null, engineGain = null;
  let _engineSpeed = 0;

  const ENGINE_IDLE_FREQ = 80;
  const ENGINE_MAX_FREQ  = 320;
  const ENGINE_DETUNE    = 7; // cents of detuning between the two oscs

  // ── City ambience ────────────────────────────────────────────────────────
  // Low bass pad + filtered noise (city hiss) — always running
  let ambienceRunning = false;
  let noiseSrc = null, noiseFilter = null, noiseGain = null;
  let bassPad = null, bassPadGain = null;

  // ── Cop siren ────────────────────────────────────────────────────────────
  // Two-tone alternating American siren, rate scales with wanted level
  let sirenOsc = null, sirenGain = null;
  let sirenInterval = null;
  let sirenToggle = false;
  let _wantedLevel = 0;

  const SIREN_FREQ_HI = 960;
  const SIREN_FREQ_LO = 770;
  const SIREN_RATES = [0, 800, 600, 350]; // ms per toggle per star level

  // ── Wanted level ambience layers ─────────────────────────────────────────
  // One looping synth loop, layers unmuted as stars increase.
  // Layer 0: bass (always on when game running)
  // Layer 1: hi-hat (star 2+)
  // Layer 2: lead stab (star 3)
  const wantedLayers = [];

  // ─── Init ───────────────────────────────────────────────────────────────
  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = ctx.createGain();
    masterGain.gain.setValueAtTime(0.8, ctx.currentTime);
    masterGain.connect(ctx.destination);

    _buildEngine();
    _buildSiren();
    _buildProximityRumble();
    _buildWantedLayers();
  }

  // ─── Engine ─────────────────────────────────────────────────────────────
  function _buildEngine() {
    engineFilter = ctx.createBiquadFilter();
    engineFilter.type = 'lowpass';
    engineFilter.frequency.setValueAtTime(400, ctx.currentTime);
    engineFilter.Q.setValueAtTime(2, ctx.currentTime);

    engineGain = ctx.createGain();
    engineGain.gain.setValueAtTime(0.18, ctx.currentTime);

    engineOsc1 = ctx.createOscillator();
    engineOsc1.type = 'sawtooth';
    engineOsc1.frequency.setValueAtTime(ENGINE_IDLE_FREQ, ctx.currentTime);
    engineOsc1.detune.setValueAtTime(ENGINE_DETUNE, ctx.currentTime);

    engineOsc2 = ctx.createOscillator();
    engineOsc2.type = 'sawtooth';
    engineOsc2.frequency.setValueAtTime(ENGINE_IDLE_FREQ, ctx.currentTime);
    engineOsc2.detune.setValueAtTime(-ENGINE_DETUNE, ctx.currentTime);

    engineOsc1.connect(engineFilter);
    engineOsc2.connect(engineFilter);
    engineFilter.connect(engineGain);
    engineGain.connect(masterGain);

    engineOsc1.start();
    engineOsc2.start();
  }

  function setEngineSpeed(norm) {
    if (!ctx) return;
    _engineSpeed = norm;
    const freq = ENGINE_IDLE_FREQ + (ENGINE_MAX_FREQ - ENGINE_IDLE_FREQ) * norm;
    const ramp = ctx.currentTime + 0.05; // slew
    engineOsc1.frequency.linearRampToValueAtTime(freq, ramp);
    engineOsc2.frequency.linearRampToValueAtTime(freq, ramp);
    // Filter opens with speed
    engineFilter.frequency.linearRampToValueAtTime(200 + 1800 * norm, ramp);
    // Volume up slightly at speed
    engineGain.gain.linearRampToValueAtTime(0.10 + 0.12 * norm, ramp);
  }

  // ─── Ambience ────────────────────────────────────────────────────────────
  function startAmbience() {
    if (!ctx || ambienceRunning) return;
    ambienceRunning = true;

    // City hiss — filtered white noise
    const bufLen = ctx.sampleRate * 2;
    const noiseBuffer = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

    noiseSrc = ctx.createBufferSource();
    noiseSrc.buffer = noiseBuffer;
    noiseSrc.loop = true;

    noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'bandpass';
    noiseFilter.frequency.setValueAtTime(800, ctx.currentTime);
    noiseFilter.Q.setValueAtTime(0.4, ctx.currentTime);

    noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.04, ctx.currentTime);

    noiseSrc.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(masterGain);
    noiseSrc.start();

    // Bass pad — deep sine drone, slow LFO swell
    bassPad = ctx.createOscillator();
    bassPad.type = 'sine';
    bassPad.frequency.setValueAtTime(55, ctx.currentTime); // A1

    const lfo = ctx.createOscillator();
    lfo.frequency.setValueAtTime(0.12, ctx.currentTime);
    const lfoGain = ctx.createGain();
    lfoGain.gain.setValueAtTime(0.03, ctx.currentTime);
    lfo.connect(lfoGain);

    bassPadGain = ctx.createGain();
    bassPadGain.gain.setValueAtTime(0, ctx.currentTime);
    bassPadGain.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 2); // fade in

    lfoGain.connect(bassPadGain.gain);
    bassPad.connect(bassPadGain);
    bassPadGain.connect(masterGain);
    bassPad.start();
    lfo.start();

    // Start 70s porno music layer
    startPornoMusic();
  }

  // ─── Siren ───────────────────────────────────────────────────────────────
  function _buildSiren() {
    sirenOsc = ctx.createOscillator();
    sirenOsc.type = 'square';
    sirenOsc.frequency.setValueAtTime(SIREN_FREQ_HI, ctx.currentTime);

    // Siren filter to soften the square a bit
    const sirenFilter = ctx.createBiquadFilter();
    sirenFilter.type = 'lowpass';
    sirenFilter.frequency.setValueAtTime(2000, ctx.currentTime);

    sirenGain = ctx.createGain();
    sirenGain.gain.setValueAtTime(0, ctx.currentTime); // starts silent

    sirenOsc.connect(sirenFilter);
    sirenFilter.connect(sirenGain);
    sirenGain.connect(masterGain);
    sirenOsc.start();
  }

  function setCopSiren(level) {
    if (!ctx) return;
    _wantedLevel = level;

    // Clear existing interval
    if (sirenInterval) { clearInterval(sirenInterval); sirenInterval = null; }

    if (level === 0) {
      sirenGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
      return;
    }

    const rate = SIREN_RATES[level];
    sirenGain.gain.linearRampToValueAtTime(0.15 + 0.05 * level, ctx.currentTime + 0.1);

    sirenInterval = setInterval(() => {
      if (!ctx) return;
      sirenToggle = !sirenToggle;
      sirenOsc.frequency.setValueAtTime(
        sirenToggle ? SIREN_FREQ_HI : SIREN_FREQ_LO,
        ctx.currentTime
      );
    }, rate);

    // Update wanted layer volumes
    _setWantedLayerLevels(level);
  }

  // ─── Wanted Level Layers ─────────────────────────────────────────────────
  // Procedural rhythmic loop built from oscillators + noise bursts.
  // Each "layer" is a looping pattern driven by setInterval scheduling.
  // Layer 0: bass pulse (always on in game)
  // Layer 1: hi-hat tick (star 2+)
  // Layer 2: stab chord (star 3)

  function _buildWantedLayers() {
    // Layer 0 — bass pulse: low sine bursts at ~120 BPM (500ms interval)
    const bassGain = ctx.createGain();
    bassGain.gain.setValueAtTime(0, ctx.currentTime);
    bassGain.connect(masterGain);

    let bassInterval = null;
    function startBass() {
      if (bassInterval) return;
      bassInterval = setInterval(() => {
        if (!ctx) return;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(55, ctx.currentTime);
        g.gain.setValueAtTime(0.0, ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.25, ctx.currentTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
        osc.connect(g); g.connect(masterGain);
        osc.start(); osc.stop(ctx.currentTime + 0.4);
      }, 500);
    }

    // Layer 1 — hi-hat: filtered noise burst at 240 BPM (250ms interval)
    let hatInterval = null;
    function startHat() {
      if (hatInterval) return;
      hatInterval = setInterval(() => {
        if (!ctx) return;
        const bufLen = Math.floor(ctx.sampleRate * 0.05);
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;

        const src = ctx.createBufferSource();
        src.buffer = buf;
        const f = ctx.createBiquadFilter();
        f.type = 'highpass';
        f.frequency.setValueAtTime(8000, ctx.currentTime);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.08, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.04);
        src.connect(f); f.connect(g); g.connect(masterGain);
        src.start(); src.stop(ctx.currentTime + 0.05);
      }, 250);
    }

    // Layer 2 — stab: quick detuned chord hit every beat
    let stabInterval = null;
    function startStab() {
      if (stabInterval) return;
      const STAB_FREQS = [110, 138.6, 165]; // A2, C#3, E3 — minor chord
      stabInterval = setInterval(() => {
        if (!ctx) return;
        STAB_FREQS.forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          osc.detune.setValueAtTime((i - 1) * 5, ctx.currentTime);
          g.gain.setValueAtTime(0.0, ctx.currentTime);
          g.gain.linearRampToValueAtTime(0.06, ctx.currentTime + 0.01);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
          osc.connect(g); g.connect(masterGain);
          osc.start(); osc.stop(ctx.currentTime + 0.2);
        });
      }, 500);
    }

    wantedLayers.push(
      { start: startBass,  stop: () => { clearInterval(bassInterval); bassInterval = null; }, minStar: 1 },
      { start: startHat,   stop: () => { clearInterval(hatInterval);  hatInterval  = null; }, minStar: 2 },
      { start: startStab,  stop: () => { clearInterval(stabInterval); stabInterval = null; }, minStar: 3 },
    );
  }

  function _setWantedLayerLevels(level) {
    for (const layer of wantedLayers) {
      if (level >= layer.minStar) {
        layer.start();
      } else {
        layer.stop();
      }
    }
  }

  // ─── Park State (tension while parked) ───────────────────────────────────
  let _parked = false;
  let tensionOsc = null, tensionGain = null;
  let tickInterval = null;
  let _tickStep = 0;

  // Sub-bass rumble for cop proximity (always running, gain driven by distance)
  let rumbleOsc = null, rumbleGain = null;

  function _buildProximityRumble() {
    rumbleOsc = ctx.createOscillator();
    rumbleOsc.type = 'sine';
    rumbleOsc.frequency.setValueAtTime(42, ctx.currentTime); // below conscious hearing, felt

    // Slight LFO flutter to make it feel organic
    const lfo = ctx.createOscillator();
    lfo.frequency.setValueAtTime(4.5, ctx.currentTime);
    const lfoGain = ctx.createGain();
    lfoGain.gain.setValueAtTime(3, ctx.currentTime);
    lfo.connect(lfoGain);
    lfoGain.connect(rumbleOsc.frequency);
    lfo.start();

    rumbleGain = ctx.createGain();
    rumbleGain.gain.setValueAtTime(0, ctx.currentTime);
    rumbleOsc.connect(rumbleGain);
    rumbleGain.connect(masterGain);
    rumbleOsc.start();
  }

  function setCopProximity(dist) {
    if (!ctx || !rumbleGain) return;
    // Audible from 150px, peaks at 0.15 gain on contact
    const gain = Math.max(0, 1 - dist / 150) * 0.15;
    rumbleGain.gain.linearRampToValueAtTime(gain, ctx.currentTime + 0.08);
  }

  function setParkState(parked) {
    if (!ctx) return;
    _parked = parked;

    if (parked) {
      // Engine off — fast fade
      if (engineGain) engineGain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.2);

      // Heartbeat tension: 60 BPM sine pulse — builds in amplitude over time
      tensionOsc = ctx.createOscillator();
      tensionOsc.type = 'sine';
      tensionOsc.frequency.setValueAtTime(55, ctx.currentTime); // low A1

      tensionGain = ctx.createGain();
      tensionGain.gain.setValueAtTime(0, ctx.currentTime);
      tensionGain.gain.linearRampToValueAtTime(0.12, ctx.currentTime + 3); // swell over 3s

      tensionOsc.connect(tensionGain);
      tensionGain.connect(masterGain);
      tensionOsc.start();

      // Timer ticks — 1 per second, pitch rises as timer runs down
      _tickStep = 0;
      tickInterval = setInterval(() => {
        if (!ctx) return;
        _tickStep++;
        // Pitch: starts at 1200Hz, rises by 80Hz per tick (urgency)
        const freq = Math.min(2400, 1200 + _tickStep * 80);

        const bufLen = Math.floor(ctx.sampleRate * 0.02);
        const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < bufLen; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(bufLen*0.15));

        const src = ctx.createBufferSource();
        src.buffer = buf;
        const f = ctx.createBiquadFilter();
        f.type = 'bandpass';
        f.frequency.setValueAtTime(freq, ctx.currentTime);
        f.Q.setValueAtTime(4, ctx.currentTime);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.12 + _tickStep * 0.01, ctx.currentTime);
        src.connect(f); f.connect(g); g.connect(masterGain);
        src.start(); src.stop(ctx.currentTime + 0.025);
      }, 1000);

    } else {
      // Leaving park — stop tension sounds, restore engine
      if (tensionOsc) { try { tensionOsc.stop(); } catch(e) {} tensionOsc = null; }
      if (tensionGain) { tensionGain.disconnect(); tensionGain = null; }
      if (tickInterval) { clearInterval(tickInterval); tickInterval = null; }
      _tickStep = 0;

      // Engine back: ramp up based on current speed
      if (engineGain) {
        const targetVol = 0.10 + 0.12 * _engineSpeed;
        engineGain.gain.linearRampToValueAtTime(targetVol, ctx.currentTime + 0.3);
      }
    }
  }

  // ─── 70s Porno Music Layer ────────────────────────────────────────────────
  // Wah guitar + walking bass + sleazy brass stabs. All procedural Web Audio.
  // Runs as a looping pattern on top of city ambience.
  // BPM: 100 (600ms per beat, 300ms per 8th note)
  //
  // Elements:
  //   Walking bass: Eb2 pentatonic pattern, fingered-bass tone (sawtooth + LP filter)
  //   Wah guitar:   sawtooth osc through sweeping bandpass filter (auto-wah envelope)
  //   Brass stab:   two-voice sawtooth chord hit, short envelope, slight detuning
  let pornoRunning = false;
  let pornoIntervals = [];
  const PORNO_BPM = 100;
  const PORNO_BEAT = 60000 / PORNO_BPM;  // ms per beat
  const PORNO_8TH  = PORNO_BEAT / 2;

  function startPornoMusic() {
    if (!ctx || pornoRunning) return;
    pornoRunning = true;

    // ── Walking bass ────────────────────────────────────────────────────────
    // Eb2 (77.78Hz) pentatonic root pattern: root, 5th, b7, root up
    // repeating 4-note riff, one note per beat
    const BASS_NOTES = [77.78, 116.54, 138.59, 155.56]; // Eb2, Bb2, Db3, Eb3
    let bassStep = 0;
    pornoIntervals.push(setInterval(() => {
      if (!ctx) return;
      const freq = BASS_NOTES[bassStep % BASS_NOTES.length];
      bassStep++;

      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);

      // Finger-bass tone: sharp LP filter, slight resonance
      const filt = ctx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.setValueAtTime(600, ctx.currentTime);
      filt.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.18);
      filt.Q.setValueAtTime(3, ctx.currentTime);

      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);

      osc.connect(filt); filt.connect(g); g.connect(masterGain);
      osc.start(); osc.stop(ctx.currentTime + 0.5);
    }, PORNO_BEAT));

    // ── Wah guitar ──────────────────────────────────────────────────────────
    // Sawtooth through auto-wah bandpass — filter sweeps up on each hit.
    // Fires on beats 2 and 4 (offbeat), classic funk rhythm guitar position.
    let wahBeat = 0;
    const WAH_CHORD = [155.56, 195.99, 233.08]; // Eb3, G3, Bb3 — Eb major
    pornoIntervals.push(setInterval(() => {
      wahBeat++;
      if (wahBeat % 2 !== 0) return; // only on even beats (2, 4)
      if (!ctx) return;

      WAH_CHORD.forEach((freq, vi) => {
        const osc = ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        osc.detune.setValueAtTime((vi - 1) * 8, ctx.currentTime);

        // Auto-wah: bandpass sweeping 400→2200Hz in 0.12s then decay
        const wah = ctx.createBiquadFilter();
        wah.type = 'bandpass';
        wah.Q.setValueAtTime(8, ctx.currentTime);
        wah.frequency.setValueAtTime(400, ctx.currentTime);
        wah.frequency.linearRampToValueAtTime(2200, ctx.currentTime + 0.12);
        wah.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.35);

        const g = ctx.createGain();
        g.gain.setValueAtTime(0, ctx.currentTime);
        g.gain.linearRampToValueAtTime(0.10, ctx.currentTime + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);

        osc.connect(wah); wah.connect(g); g.connect(masterGain);
        osc.start(); osc.stop(ctx.currentTime + 0.35);
      });
    }, PORNO_BEAT));

    // ── Brass stab ──────────────────────────────────────────────────────────
    // Short two-voice stab on beat 3 of every 2-bar phrase (every 8 beats).
    // Eb major 7 chord voiced for sleazy brass feel.
    let brassCount = 0;
    const BRASS_VOICING = [
      [233.08, 277.18],  // Bb3 + Db4
      [311.13, 369.99],  // Eb4 + F#4 (slightly dissonant — exactly right)
    ];
    pornoIntervals.push(setInterval(() => {
      brassCount++;
      if (brassCount % 8 !== 3) return; // beat 3 of the 2-bar phrase
      if (!ctx) return;

      BRASS_VOICING.forEach(([f1, f2]) => {
        [f1, f2].forEach((freq, vi) => {
          const osc = ctx.createOscillator();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(freq, ctx.currentTime);
          osc.detune.setValueAtTime(vi * 6, ctx.currentTime); // slight detune per voice

          // Brass-ish tone: LP filter with a small resonance bump
          const filt = ctx.createBiquadFilter();
          filt.type = 'lowpass';
          filt.frequency.setValueAtTime(3000, ctx.currentTime);
          filt.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
          filt.Q.setValueAtTime(2, ctx.currentTime);

          const g = ctx.createGain();
          g.gain.setValueAtTime(0, ctx.currentTime);
          g.gain.linearRampToValueAtTime(0.13, ctx.currentTime + 0.015); // punchy attack
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);

          osc.connect(filt); filt.connect(g); g.connect(masterGain);
          osc.start(); osc.stop(ctx.currentTime + 0.25);
        });
      });
    }, PORNO_BEAT));
  }

  function stopPornoMusic() {
    for (const id of pornoIntervals) clearInterval(id);
    pornoIntervals = [];
    pornoRunning = false;
  }

  // ─── Pickup / Dropoff jingles ─────────────────────────────────────────────
  function playPickup() {
    if (!ctx) return;
    // Ascending 3-note major chime: C5, E5, G5
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      const t = ctx.currentTime + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.18, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t + 0.35);
    });
  }

  function playDropoff(earningsAmt) {
    if (!ctx) return;
    // Reversed chime (descending) + cash register tick
    [783.99, 659.25, 523.25].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      const t = ctx.currentTime + i * 0.08;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.16, t + 0.015);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc.connect(g); g.connect(masterGain);
      osc.start(t); osc.stop(t + 0.3);
    });

    // Cash register tick — short metallic click
    const t2 = ctx.currentTime + 0.25;
    const bufLen = Math.floor(ctx.sampleRate * 0.03);
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufLen * 0.3));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const f = ctx.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.setValueAtTime(3000, t2);
    f.Q.setValueAtTime(1, t2);
    const g2 = ctx.createGain();
    g2.gain.setValueAtTime(0.25, t2);
    src.connect(f); f.connect(g2); g2.connect(masterGain);
    src.start(t2); src.stop(t2 + 0.05);
  }

  return { init, setEngineSpeed, playPickup, playDropoff, setCopSiren, startAmbience, startPornoMusic, stopPornoMusic, setParkState, setCopProximity };
})();

</script>

<script>
'use strict';

'use strict';

// Audio engine is defined in the first script block above

// ─── Constants ─────────────────────────────────────────────────────────────
const CANVAS_W = 800;
const CANVAS_H = 600;

const TILE_SIZE  = 32;
const CITY_TILES = 40;
const CITY_SIZE  = CITY_TILES * TILE_SIZE; // 1280px

const BLOCK_SIZE = 4;
const ROAD_WIDTH = 2;
const PERIOD     = BLOCK_SIZE + ROAD_WIDTH; // 6 tiles per period

// Tile types
const TILE = { ROAD: 0, BUILDING: 1, SIDEWALK: 2, HIDDEN_PARK: 3 };

// Colors
const COLOR = {
  ROAD:        '#1a1a2e',
  SIDEWALK:    '#2a2a3e',
  HIDDEN_PARK: '#0d0d1a',
  ROAD_MARK:   '#ffee00',
  BG:          '#0a0a12',
};
const BUILDING_COLORS = ['#0d0d1a','#1a0d0d','#0d1a0d','#1a1a0d','#0d0d22','#22110d'];
const NEON_COLORS     = ['#ff00aa','#00ffee','#aaff00','#ff6600','#ff0055'];

// Car physics
const CAR_W        = 16;
const CAR_H        = 28;
const MAX_SPEED    = 4.0;
const ACCELERATION = 0.15;
const FRICTION     = 0.92;
const TURN_RATE    = 3;        // degrees per frame

// Game rules
const WORKER_PICKUP_RADIUS  = 20;
const DROP_RADIUS           = 20;
const COP_BUST_RADIUS       = 20;
const COP_CHASE_RADIUS      = 80;   // cop switches to CHASE within this dist (worker in car)
const COP_NEAR_PARK_RADIUS  = 120;  // edge-flash when parked and cop this close
const PARK_SPEED_THRESHOLD  = 0.3;
const PARK_TIMER_DURATION   = 5;    // seconds
const COP_PATROL_SPEED      = 1.5;
const COP_CHASE_SPEED       = 2.8;
const PATROL_REACH          = 16;   // px to advance patrol index
const DROPOFF_MIN_DIST      = 50;
const DROPOFF_MAX_DIST      = 200;
const MIN_EARNINGS          = 15;
const MAX_EARNINGS          = 40;
const COP_SPAWN_DIST        = 300;
const INITIAL_COP_COUNT     = 2;
const STAR_THRESHOLDS       = [3, 6, 10];
const MAX_STARS             = 3;

// Game phases
const PHASE = {
  FIND_WORKER: 'FIND_WORKER',  // looking for worker on sidewalk
  HAS_WORKER:  'HAS_WORKER',   // worker in car, find hidden park
  PARKED:      'PARKED',       // at hidden park, timer running
  DROPOFF:     'DROPOFF',      // drive to drop-off tile
};

// ─── State ─────────────────────────────────────────────────────────────────
let canvas, ctx;
let map, blockColors, neonSigns, windows;
let hiddenParks = [];  // [{tx, ty, wx, wy}]

const Player = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, speed: 0 };

let workers    = [];   // [{x,y}] sidewalk waypoints
let dropoffPos = null; // {x,y} road tile for drop-off
let earnings   = 0;
let dropoffs   = 0;
let wantedLevel = 0;
let cops       = [];   // full cop objects
let pulse      = 0;

let gamePhase          = PHASE.FIND_WORKER;
let workerInCar        = false;
let isParked           = false;
let parkTimerEnd       = 0;
let parkTimerRemaining = 0;
let dropoffEarnings    = 0;
let nearCopWarningTimer = 0;
let nearestCopDist     = 999;

const keys = {};
const STATE = { PLAYING: 'PLAYING', BUSTED: 'BUSTED' };
let gameState    = STATE.PLAYING;
let bustFlash    = 0;
let audioStarted = false;

// ─── Exports for audio engine ───────────────────────────────────────────────
window.TILE    = TILE;
window.getTile = function(worldX, worldY) {
  const tx = Math.floor(worldX / TILE_SIZE);
  const ty = Math.floor(worldY / TILE_SIZE);
  if (tx < 0 || ty < 0 || tx >= CITY_TILES || ty >= CITY_TILES) return TILE.BUILDING;
  return map[ty][tx];
};

window.CopPatrolRoutes    = [];  // [[{x,y},...], ...] one per cop
window.NearestCopDistance = 999; // live px

window.GameState = {
  get parked()      { return isParked; },
  get parkTimer()   { return parkTimerRemaining; },
  get workerInCar() { return workerInCar; },
};

// ─── Tile Helpers ───────────────────────────────────────────────────────────
function isRoadCol(tileX) { return (tileX % PERIOD) < ROAD_WIDTH; }
function isRoadRow(tileY) { return (tileY % PERIOD) < ROAD_WIDTH; }

function tilePassable(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= CITY_TILES || ty >= CITY_TILES) return false;
  const t = map[ty][tx];
  return t === TILE.ROAD || t === TILE.HIDDEN_PARK;
}

function isSidewalkTile(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= CITY_TILES || ty >= CITY_TILES) return false;
  return map[ty][tx] === TILE.SIDEWALK;
}

// ─── Map Generation ────────────────────────────────────────────────────────
function generateMap() {
  map = [];
  for (let y = 0; y < CITY_TILES; y++) {
    map[y] = [];
    for (let x = 0; x < CITY_TILES; x++) {
      const rX = isRoadCol(x), rY = isRoadRow(y);
      if (rX || rY) {
        map[y][x] = TILE.ROAD;
      } else {
        const adj = isRoadCol(x-1) || isRoadCol(x+1) || isRoadRow(y-1) || isRoadRow(y+1);
        map[y][x] = adj ? TILE.SIDEWALK : TILE.BUILDING;
      }
    }
  }

  // ── Hidden park tiles (non-intersection corridor tiles) ──────────────────
  const corridors = [];
  for (let y = 2; y < CITY_TILES - 2; y++) {
    for (let x = 2; x < CITY_TILES - 2; x++) {
      if (map[y][x] === TILE.ROAD && !(isRoadCol(x) && isRoadRow(y))) {
        corridors.push({ x, y });
      }
    }
  }
  // Seeded shuffle, pick 7
  const rngH = mulberry32(555);
  for (let i = corridors.length - 1; i > 0; i--) {
    const j = Math.floor(rngH() * (i + 1));
    [corridors[i], corridors[j]] = [corridors[j], corridors[i]];
  }
  hiddenParks = [];
  for (const t of corridors.slice(0, 7)) {
    map[t.y][t.x] = TILE.HIDDEN_PARK;
    hiddenParks.push({
      tx: t.x, ty: t.y,
      wx: t.x * TILE_SIZE + TILE_SIZE / 2,
      wy: t.y * TILE_SIZE + TILE_SIZE / 2,
    });
  }

  // ── Block colors ─────────────────────────────────────────────────────────
  blockColors = [];
  for (let by = 0; by < CITY_TILES; by++) {
    blockColors[by] = [];
    for (let bx = 0; bx < CITY_TILES; bx++) {
      const seed = Math.floor(by / PERIOD) * 100 + Math.floor(bx / PERIOD);
      blockColors[by][bx] = BUILDING_COLORS[seed % BUILDING_COLORS.length];
    }
  }

  // ── Pre-bake windows ─────────────────────────────────────────────────────
  windows = [];
  const rng = mulberry32(42);
  for (let y = 0; y < CITY_TILES; y++) {
    for (let x = 0; x < CITY_TILES; x++) {
      if (map[y][x] !== TILE.BUILDING) continue;
      for (let wy = 4; wy < TILE_SIZE - 4; wy += 6) {
        for (let wx = 4; wx < TILE_SIZE - 4; wx += 6) {
          if (rng() < 0.30) {
            windows.push({ px: x*TILE_SIZE+wx, py: y*TILE_SIZE+wy, bright: rng() > 0.5 });
          }
        }
      }
    }
  }

  // ── Neon signs ───────────────────────────────────────────────────────────
  neonSigns = [];
  const rng2 = mulberry32(99);
  const cnt  = 2 + Math.floor(rng2() * 2);
  for (let i = 0; i < cnt; i++) {
    let tx, ty;
    do { tx = Math.floor(rng2() * CITY_TILES); ty = Math.floor(rng2() * CITY_TILES); }
    while (map[ty][tx] !== TILE.BUILDING);
    neonSigns.push({
      px: tx*TILE_SIZE+2, py: ty*TILE_SIZE+2,
      w: TILE_SIZE-4, h: TILE_SIZE-4,
      color: NEON_COLORS[Math.floor(rng2() * NEON_COLORS.length)],
    });
  }
}

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─── Position Helpers ────────────────────────────────────────────────────────
function randomRoadPos() {
  let tx, ty, tries = 0;
  do {
    tx = Math.floor(Math.random() * CITY_TILES);
    ty = Math.floor(Math.random() * CITY_TILES);
    tries++;
  } while (!tilePassable(tx, ty) && tries < 500);
  return { x: tx*TILE_SIZE + TILE_SIZE/2, y: ty*TILE_SIZE + TILE_SIZE/2 };
}

function randomRoadPosFarFrom(px, py, minDist) {
  let pos, tries = 0;
  do { pos = randomRoadPos(); tries++; }
  while (dist(pos.x, pos.y, px, py) < minDist && tries < 200);
  return pos;
}

function randomRoadPosBetween(px, py, minD, maxD) {
  let pos, tries = 0;
  do {
    pos = randomRoadPos();
    const d = dist(pos.x, pos.y, px, py);
    if (d >= minD && d <= maxD) return pos;
    tries++;
  } while (tries < 300);
  return randomRoadPosFarFrom(px, py, minD);
}

function randomSidewalkPos() {
  let tx, ty, tries = 0;
  do {
    tx = Math.floor(Math.random() * CITY_TILES);
    ty = Math.floor(Math.random() * CITY_TILES);
    tries++;
  } while (!isSidewalkTile(tx, ty) && tries < 500);
  return { x: tx*TILE_SIZE + TILE_SIZE/2, y: ty*TILE_SIZE + TILE_SIZE/2 };
}

function randomSidewalkPosFarFrom(px, py, minDist) {
  let pos, tries = 0;
  do { pos = randomSidewalkPos(); tries++; }
  while (dist(pos.x, pos.y, px, py) < minDist && tries < 200);
  return pos;
}

// ─── Math Helpers ───────────────────────────────────────────────────────────
function dist(ax, ay, bx, by) {
  const dx = bx-ax, dy = by-ay;
  return Math.sqrt(dx*dx + dy*dy);
}
function degToRad(d) { return d * Math.PI / 180; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ─── Collision ──────────────────────────────────────────────────────────────
function isBuildingAt(wx, wy) {
  const tx = Math.floor(wx / TILE_SIZE), ty = Math.floor(wy / TILE_SIZE);
  if (tx < 0 || ty < 0 || tx >= CITY_TILES || ty >= CITY_TILES) return true;
  return map[ty][tx] === TILE.BUILDING;
}
function carOverlapsBuilding(cx, cy) {
  const hw = CAR_W/2, hh = CAR_H/2;
  return [[cx-hw,cy-hh],[cx+hw,cy-hh],[cx-hw,cy+hh],[cx+hw,cy+hh]]
    .some(([x,y]) => isBuildingAt(x,y));
}

// ─── Cop Patrol Generation ───────────────────────────────────────────────────
function generatePatrolRoute(startX, startY, n) {
  const route = [];
  let cx = startX, cy = startY;
  for (let i = 0; i < n; i++) {
    const p = randomRoadPosFarFrom(cx, cy, 100);
    route.push({ x: p.x, y: p.y });
    cx = p.x; cy = p.y;
  }
  return route;
}

// ─── Cop Spawning ───────────────────────────────────────────────────────────
function spawnCops(targetCount) {
  while (cops.length < targetCount) {
    const pos    = randomRoadPosFarFrom(Player.x, Player.y, COP_SPAWN_DIST);
    const nPts   = 3 + Math.floor(Math.random() * 3);
    const patrol = generatePatrolRoute(pos.x, pos.y, nPts);
    cops.push({
      x: pos.x, y: pos.y,
      vx: 0, vy: 0,
      angle: 0,
      patrolPoints: patrol,
      patrolIndex:  0,
      mode: 'PATROL',
    });
  }
  while (cops.length > targetCount) cops.pop();
  window.CopPatrolRoutes = cops.map(c => c.patrolPoints.slice());
}

function updateWanted() {
  let lvl = 0;
  for (let i = 0; i < STAR_THRESHOLDS.length; i++) {
    if (dropoffs >= STAR_THRESHOLDS[i]) lvl = i + 1;
  }
  if (lvl !== wantedLevel) {
    wantedLevel = lvl;
    Audio.setCopSiren(wantedLevel);
    spawnCops(INITIAL_COP_COUNT + wantedLevel);
  }
}

// ─── Game Init ───────────────────────────────────────────────────────────────
function initGame() {
  generateMap();

  const sp   = randomRoadPos();
  Player.x   = sp.x; Player.y = sp.y;
  Player.vx  = 0;    Player.vy = 0;
  Player.angle = 0;  Player.speed = 0;

  workers   = [];
  for (let i = 0; i < 2; i++) {
    workers.push(randomSidewalkPosFarFrom(Player.x, Player.y, 80));
  }

  dropoffPos          = null;
  earnings            = 0;
  dropoffs            = 0;
  wantedLevel         = 0;
  cops                = [];
  pulse               = 0;
  gameState           = STATE.PLAYING;
  bustFlash           = 0;
  gamePhase           = PHASE.FIND_WORKER;
  workerInCar         = false;
  isParked            = false;
  parkTimerEnd        = 0;
  parkTimerRemaining  = 0;
  dropoffEarnings     = 0;
  nearCopWarningTimer = 0;
  nearestCopDist      = 999;

  window.NearestCopDistance = 999;
  spawnCops(INITIAL_COP_COUNT);
}

// ─── Update ─────────────────────────────────────────────────────────────────
function update() {
  if (gameState === STATE.BUSTED) {
    if (bustFlash > 0) bustFlash--;
    if (keys[' '] || keys['Space']) initGame();
    return;
  }

  if (!audioStarted && Object.keys(keys).some(k => keys[k])) {
    Audio.init();
    Audio.startAmbience();
    audioStarted = true;
  }

  pulse += 0.08;

  // ── Steering ──────────────────────────────────────────────────────────────
  const moving = Math.abs(Player.speed) > 0.1;
  if (moving && gamePhase !== PHASE.PARKED) {
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) Player.angle -= TURN_RATE * (Player.speed / MAX_SPEED);
    if (keys['ArrowRight'] || keys['d'] || keys['D']) Player.angle += TURN_RATE * (Player.speed / MAX_SPEED);
  }

  // ── Throttle ──────────────────────────────────────────────────────────────
  if (gamePhase !== PHASE.PARKED) {
    const rad  = degToRad(Player.angle);
    const fwdX = Math.sin(rad), fwdY = -Math.cos(rad);
    if (keys['ArrowUp']   || keys['w'] || keys['W']) { Player.vx += fwdX * ACCELERATION;       Player.vy += fwdY * ACCELERATION; }
    if (keys['ArrowDown'] || keys['s'] || keys['S']) { Player.vx -= fwdX * ACCELERATION * 0.6; Player.vy -= fwdY * ACCELERATION * 0.6; }
  }

  // ── Friction & speed cap ──────────────────────────────────────────────────
  Player.vx *= FRICTION;
  Player.vy *= FRICTION;
  const spd = Math.sqrt(Player.vx*Player.vx + Player.vy*Player.vy);
  if (spd > MAX_SPEED) { Player.vx = (Player.vx/spd)*MAX_SPEED; Player.vy = (Player.vy/spd)*MAX_SPEED; }
  Player.speed = spd;

  // ── Move & collide ────────────────────────────────────────────────────────
  const nx = Player.x + Player.vx, ny = Player.y + Player.vy;
  if      (!carOverlapsBuilding(nx, ny))       { Player.x = nx; Player.y = ny; }
  else if (!carOverlapsBuilding(nx, Player.y)) { Player.x = nx; Player.vy = 0; }
  else if (!carOverlapsBuilding(Player.x, ny)) { Player.y = ny; Player.vx = 0; }
  else                                          { Player.vx = 0; Player.vy = 0; }
  Player.x = clamp(Player.x, CAR_W/2, CITY_SIZE - CAR_W/2);
  Player.y = clamp(Player.y, CAR_H/2, CITY_SIZE - CAR_H/2);

  Audio.setEngineSpeed(Player.speed / MAX_SPEED);

  // ── Phase logic ───────────────────────────────────────────────────────────
  if (gamePhase === PHASE.FIND_WORKER) {
    for (let i = workers.length - 1; i >= 0; i--) {
      if (dist(Player.x, Player.y, workers[i].x, workers[i].y) < WORKER_PICKUP_RADIUS) {
        workers.splice(i, 1);
        workerInCar = true;
        gamePhase   = PHASE.HAS_WORKER;
        Audio.playPickup();
        break;
      }
    }

  } else if (gamePhase === PHASE.HAS_WORKER) {
    const ptx = Math.floor(Player.x / TILE_SIZE);
    const pty = Math.floor(Player.y / TILE_SIZE);
    const onHiddenPark = map[pty] && map[pty][ptx] === TILE.HIDDEN_PARK;
    if (onHiddenPark && Player.speed < PARK_SPEED_THRESHOLD) {
      // Enter park state
      gamePhase          = PHASE.PARKED;
      isParked           = true;
      parkTimerEnd       = Date.now() + PARK_TIMER_DURATION * 1000;
      parkTimerRemaining = PARK_TIMER_DURATION;
      Player.vx = 0; Player.vy = 0;
      Audio.setParkState(true);
      // Hidden spot — cops go blind
      for (const c of cops) c.mode = 'PATROL';
    }

  } else if (gamePhase === PHASE.PARKED) {
    const now = Date.now();
    parkTimerRemaining = Math.max(0, (parkTimerEnd - now) / 1000);
    if (parkTimerRemaining <= 0) {
      isParked    = false;
      workerInCar = false;
      gamePhase   = PHASE.DROPOFF;
      Audio.setParkState(false);
      dropoffEarnings = MIN_EARNINGS + Math.floor(Math.random() * (MAX_EARNINGS - MIN_EARNINGS + 1));
      dropoffPos  = randomRoadPosBetween(Player.x, Player.y, DROPOFF_MIN_DIST, DROPOFF_MAX_DIST);
    }

  } else if (gamePhase === PHASE.DROPOFF) {
    if (dropoffPos && dist(Player.x, Player.y, dropoffPos.x, dropoffPos.y) < DROP_RADIUS) {
      earnings  += dropoffEarnings;
      dropoffs++;
      Audio.playDropoff(dropoffEarnings);
      dropoffPos = null;
      gamePhase  = PHASE.FIND_WORKER;
      workers.push(randomSidewalkPosFarFrom(Player.x, Player.y, 80));
      updateWanted();
    }
  }

  // ── Cop AI ────────────────────────────────────────────────────────────────
  nearestCopDist = 999;

  for (const cop of cops) {
    const pd = dist(cop.x, cop.y, Player.x, Player.y);
    if (pd < nearestCopDist) nearestCopDist = pd;

    // Mode switching — cops blind inside hidden park
    if (!isParked) {
      if (workerInCar && pd < COP_CHASE_RADIUS) {
        cop.mode = 'CHASE';
      } else if (cop.mode === 'CHASE' && pd > COP_CHASE_RADIUS * 2) {
        cop.mode = 'PATROL'; // lost sight
      }
    }

    if (cop.mode === 'PATROL') {
      const tgt = cop.patrolPoints[cop.patrolIndex];
      const dx  = tgt.x - cop.x, dy = tgt.y - cop.y;
      const d   = Math.sqrt(dx*dx + dy*dy);
      if (d < PATROL_REACH) {
        cop.patrolIndex = (cop.patrolIndex + 1) % cop.patrolPoints.length;
      } else {
        cop.vx    = (dx/d) * COP_PATROL_SPEED;
        cop.vy    = (dy/d) * COP_PATROL_SPEED;
        cop.angle = Math.atan2(dx, -dy) * 180 / Math.PI;
      }
    } else {
      // CHASE
      const dx = Player.x - cop.x, dy = Player.y - cop.y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d > 0) {
        cop.vx    = (dx/d) * COP_CHASE_SPEED;
        cop.vy    = (dy/d) * COP_CHASE_SPEED;
        cop.angle = Math.atan2(dx, -dy) * 180 / Math.PI;
      }
    }
    cop.x += cop.vx;
    cop.y += cop.vy;

    // BUST: cop reaches player while worker is in car AND not in hidden park
    if (workerInCar && !isParked && pd < COP_BUST_RADIUS) {
      gameState = STATE.BUSTED;
      bustFlash = 30;
      Audio.setCopSiren(0);
      Audio.setParkState(false);
      return;
    }
  }

  window.NearestCopDistance = nearestCopDist;
  Audio.setCopProximity(nearestCopDist);

  // Near-cop warning while parked (visual stress, no bust)
  if (isParked && nearestCopDist < COP_NEAR_PARK_RADIUS) nearCopWarningTimer = 30;
  if (nearCopWarningTimer > 0) nearCopWarningTimer--;
}

// ─── Rendering ──────────────────────────────────────────────────────────────
function getCameraOffset() {
  return {
    ox: Math.round(Player.x - CANVAS_W / 2),
    oy: Math.round(Player.y - CANVAS_H / 2),
  };
}

function drawMap(ox, oy) {
  const startTX = Math.max(0, Math.floor(ox / TILE_SIZE));
  const startTY = Math.max(0, Math.floor(oy / TILE_SIZE));
  const endTX   = Math.min(CITY_TILES-1, Math.ceil((ox+CANVAS_W) / TILE_SIZE));
  const endTY   = Math.min(CITY_TILES-1, Math.ceil((oy+CANVAS_H) / TILE_SIZE));

  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      const sx = tx*TILE_SIZE - ox, sy = ty*TILE_SIZE - oy;
      const t  = map[ty][tx];

      if (t === TILE.HIDDEN_PARK) {
        ctx.fillStyle = COLOR.HIDDEN_PARK;
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
        // Faint purple glow border
        ctx.save();
        ctx.shadowColor = '#4400aa';
        ctx.shadowBlur  = 8;
        ctx.strokeStyle = 'rgba(80,0,180,0.25)';
        ctx.lineWidth   = 1;
        ctx.strokeRect(sx+0.5, sy+0.5, TILE_SIZE-1, TILE_SIZE-1);
        ctx.restore();
        // Subtle discovery marker
        ctx.save();
        ctx.globalAlpha  = 0.2;
        ctx.fillStyle    = '#8844cc';
        ctx.font         = '8px monospace';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('▮', sx + TILE_SIZE/2, sy + TILE_SIZE/2);
        ctx.textBaseline = 'alphabetic';
        ctx.globalAlpha  = 1;
        ctx.restore();
      } else if (t === TILE.ROAD) {
        ctx.fillStyle = COLOR.ROAD;
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
      } else if (t === TILE.SIDEWALK) {
        ctx.fillStyle = COLOR.SIDEWALK;
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
      } else {
        ctx.fillStyle = blockColors[ty][tx];
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
      }
    }
  }

  // Road dashes (also on HIDDEN_PARK for visual continuity)
  ctx.strokeStyle = COLOR.ROAD_MARK;
  ctx.lineWidth   = 1;
  ctx.setLineDash([6, 10]);

  const roadLike = (r, c) =>
    r >= 0 && r < CITY_TILES && c >= 0 && c < CITY_TILES &&
    (map[r][c] === TILE.ROAD || map[r][c] === TILE.HIDDEN_PARK);

  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      const t = map[ty][tx];
      if (t !== TILE.ROAD && t !== TILE.HIDDEN_PARK) continue;
      const sx = tx*TILE_SIZE - ox, sy = ty*TILE_SIZE - oy;
      const h  = roadLike(ty-1, tx) && roadLike(ty+1, tx);
      const v  = roadLike(ty, tx-1) && roadLike(ty, tx+1);
      if (h && !v) {
        ctx.beginPath(); ctx.moveTo(sx+TILE_SIZE/2, sy); ctx.lineTo(sx+TILE_SIZE/2, sy+TILE_SIZE); ctx.stroke();
      } else if (v && !h) {
        ctx.beginPath(); ctx.moveTo(sx, sy+TILE_SIZE/2); ctx.lineTo(sx+TILE_SIZE, sy+TILE_SIZE/2); ctx.stroke();
      }
    }
  }
  ctx.setLineDash([]);
}

function drawWindows(ox, oy) {
  for (const w of windows) {
    if (w.px < ox || w.px > ox+CANVAS_W || w.py < oy || w.py > oy+CANVAS_H) continue;
    ctx.fillStyle = w.bright ? '#ffffcc' : '#ffee88';
    ctx.fillRect(w.px-ox, w.py-oy, 2, 2);
  }
}

function drawNeonSigns(ox, oy) {
  for (const n of neonSigns) {
    const sx = n.px-ox, sy = n.py-oy;
    if (sx+n.w < 0 || sx > CANVAS_W || sy+n.h < 0 || sy > CANVAS_H) continue;
    ctx.save();
    ctx.shadowColor = n.color; ctx.shadowBlur = 12;
    ctx.fillStyle   = n.color + '55'; ctx.fillRect(sx, sy, n.w, n.h);
    ctx.strokeStyle = n.color; ctx.lineWidth = 2; ctx.strokeRect(sx, sy, n.w, n.h);
    ctx.restore();
  }
}

function drawWaypoints(ox, oy) {
  const p = 0.6 + 0.4 * Math.sin(pulse);
  const r = 10  + 4   * Math.sin(pulse);

  // Worker waypoints (sidewalk curb)
  for (const w of workers) {
    const sx = w.x - ox, sy = w.y - oy;
    if (sx < -60 || sx > CANVAS_W+60 || sy < -60 || sy > CANVAS_H+60) continue;
    ctx.save();
    ctx.globalAlpha = p;
    ctx.shadowColor = '#00ff55'; ctx.shadowBlur = 20;
    ctx.strokeStyle = '#00ff55'; ctx.lineWidth  = 2;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
    // Person icon
    ctx.save();
    ctx.fillStyle = '#00ff88';
    ctx.font      = '14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('◉', sx, sy);
    ctx.textBaseline = 'alphabetic';
    ctx.font    = '8px monospace';
    ctx.fillStyle = '#00ff55';
    ctx.fillText('WORKER', sx, sy - r - 4);
    ctx.restore();
  }

  // Drop-off waypoint (after parking transaction)
  if (gamePhase === PHASE.DROPOFF && dropoffPos) {
    const sx = dropoffPos.x - ox, sy = dropoffPos.y - oy;
    if (sx >= -60 && sx <= CANVAS_W+60 && sy >= -60 && sy <= CANVAS_H+60) {
      ctx.save();
      ctx.globalAlpha = p;
      ctx.shadowColor = '#ffee00'; ctx.shadowBlur = 20;
      ctx.strokeStyle = '#ffee00'; ctx.lineWidth  = 2;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
      ctx.fillStyle = '#ffee55';
      ctx.font      = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('DROP-OFF', sx, sy - r - 4);
    }
  }
}

function drawCar(cx, cy, angle, isPlayer) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(degToRad(angle));

  if (isPlayer) {
    ctx.fillStyle = '#dddddd';
    ctx.fillRect(-CAR_W/2, -CAR_H/2, CAR_W, CAR_H);
    ctx.fillStyle = '#ffee55';
    ctx.fillRect(-CAR_W/2+2, -CAR_H/2, 4, 3);
    ctx.fillRect(CAR_W/2-6,  -CAR_H/2, 4, 3);
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(-CAR_W/2+2, CAR_H/2-3, 4, 3);
    ctx.fillRect(CAR_W/2-6,  CAR_H/2-3, 4, 3);
    ctx.fillStyle = '#334455';
    ctx.fillRect(-CAR_W/2+3, -CAR_H/2+4, CAR_W-6, 6);
  } else {
    ctx.save();
    ctx.shadowColor = '#0088ff'; ctx.shadowBlur = 12;
    ctx.fillStyle   = '#aaccff';
    ctx.fillRect(-CAR_W/2, -CAR_H/2, CAR_W, CAR_H);
    ctx.restore();
    ctx.fillStyle = '#0044cc';
    ctx.fillRect(-CAR_W/2+3, -CAR_H/2+4, CAR_W-6, 5);
    ctx.fillRect(-CAR_W/2+3, CAR_H/2-9,  CAR_W-6, 5);
    // Siren flash — alternates only in CHASE mode
    ctx.fillStyle = Math.sin(pulse*3) > 0 ? '#ff0000' : '#0000ff';
    ctx.fillRect(-4, -CAR_H/2-3, 8, 3);
  }
  ctx.restore();
}

function drawCops(ox, oy) {
  for (const cop of cops) {
    const sx = cop.x - ox, sy = cop.y - oy;
    if (sx < -60 || sx > CANVAS_W+60 || sy < -60 || sy > CANVAS_H+60) continue;
    drawCar(sx, sy, cop.angle, false);
  }
}

// Draw circular park countdown at car screen position
function drawParkCountdown(screenX, screenY) {
  const elapsed  = PARK_TIMER_DURATION - parkTimerRemaining;
  const progress = elapsed / PARK_TIMER_DURATION; // 0→1 as timer runs down
  const radius   = 22;
  const start    = -Math.PI / 2;
  const end      = start + (1 - progress) * Math.PI * 2;

  ctx.save();
  // Outer ring background
  ctx.beginPath();
  ctx.arc(screenX, screenY, radius, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(80,0,180,0.4)';
  ctx.lineWidth   = 5;
  ctx.stroke();

  // Remaining arc (depleting)
  if (parkTimerRemaining > 0) {
    ctx.beginPath();
    ctx.arc(screenX, screenY, radius, start, end, false);
    const frac = parkTimerRemaining / PARK_TIMER_DURATION;
    ctx.strokeStyle = frac > 0.5 ? '#cc44ff' : frac > 0.25 ? '#ff8800' : '#ff2200';
    ctx.lineWidth   = 4;
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur  = 10;
    ctx.stroke();
  }

  // Tick text inside
  ctx.fillStyle    = '#cc88ff';
  ctx.font         = 'bold 11px monospace';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(Math.ceil(parkTimerRemaining) + 's', screenX, screenY);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function drawHUD() {
  // ── Top left: earnings ───────────────────────────────────────────────────
  ctx.fillStyle = '#00ff55';
  ctx.font      = 'bold 20px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('$' + earnings, 14, 28);

  // ── Passenger status ─────────────────────────────────────────────────────
  if (workerInCar || isParked) {
    ctx.save();
    ctx.fillStyle  = '#ff9944';
    ctx.font       = 'bold 12px monospace';
    ctx.textAlign  = 'left';
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur  = 8;
    ctx.fillText('PASSENGER: IN', 14, 46);
    ctx.restore();
  } else if (gamePhase === PHASE.FIND_WORKER && workers.length > 0) {
    // Hint arrow toward nearest worker
    const w   = workers[0];
    const dx  = w.x - Player.x, dy = w.y - Player.y;
    const a   = Math.atan2(dx, -dy);
    ctx.fillStyle = '#00ff88';
    ctx.font      = '11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('WORKER ' + angleToArrow(a), 14, 46);
  }

  // ── Top right: wanted stars ───────────────────────────────────────────────
  ctx.font      = '22px monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i < MAX_STARS; i++) {
    ctx.fillStyle = i < wantedLevel ? '#ffee00' : '#333333';
    ctx.fillText(i < wantedLevel ? '★' : '☆', CANVAS_W - 14 - (MAX_STARS-1-i)*26, 28);
  }

  // ── Bottom left: title ───────────────────────────────────────────────────
  ctx.fillStyle = '#666666';
  ctx.font      = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('NIGHT SHIFT', 14, CANVAS_H - 14);

  // ── Bottom center: park timer HUD OR speed bar ───────────────────────────
  const BAR_W = 120, BAR_H = 8;
  const bx    = (CANVAS_W - BAR_W) / 2;
  const by    = CANVAS_H - 22;

  if (isParked) {
    // Show park countdown bar in HUD
    const frac = parkTimerRemaining / PARK_TIMER_DURATION;
    ctx.fillStyle = '#111122';
    ctx.fillRect(bx, by, BAR_W, BAR_H);
    const barCol = frac > 0.5 ? '#cc44ff' : frac > 0.25 ? '#ff8800' : '#ff2200';
    ctx.fillStyle = barCol;
    ctx.fillRect(bx, by, BAR_W * frac, BAR_H);
    ctx.strokeStyle = '#552288';
    ctx.lineWidth   = 1;
    ctx.strokeRect(bx, by, BAR_W, BAR_H);
    ctx.fillStyle   = '#aa66cc';
    ctx.font        = '10px monospace';
    ctx.textAlign   = 'center';
    ctx.fillText('PARKED ' + Math.ceil(parkTimerRemaining) + 's', CANVAS_W/2, CANVAS_H - 10);
  } else {
    // Normal speed bar
    const sr   = Player.speed / MAX_SPEED;
    const sCol = sr > 0.8 ? '#ff4400' : sr > 0.5 ? '#ffaa00' : '#00ff88';
    ctx.fillStyle = '#222233';
    ctx.fillRect(bx, by, BAR_W, BAR_H);
    ctx.fillStyle = sCol;
    ctx.fillRect(bx, by, BAR_W * sr, BAR_H);
    ctx.strokeStyle = '#444455';
    ctx.lineWidth   = 1;
    ctx.strokeRect(bx, by, BAR_W, BAR_H);
    ctx.fillStyle   = '#555566';
    ctx.font        = '10px monospace';
    ctx.textAlign   = 'center';
    ctx.fillText('SPD', CANVAS_W/2, CANVAS_H - 10);
  }
}

function angleToArrow(rad) {
  const deg    = ((rad * 180 / Math.PI) + 360) % 360;
  const arrows = ['↑','↗','→','↘','↓','↙','←','↖'];
  return arrows[Math.round(deg / 45) % 8];
}

function drawBustedScreen() {
  if (bustFlash > 0) {
    ctx.fillStyle = `rgba(255,0,0,${bustFlash/30*0.7})`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    return;
  }
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.font      = 'bold 72px monospace';
  ctx.fillText('BUSTED', CANVAS_W/2, CANVAS_H/2 - 40);
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(CANVAS_W/2 - 160, CANVAS_H/2 - 26, 320, 3);
  ctx.fillStyle = '#00ff55';
  ctx.font      = 'bold 24px monospace';
  ctx.fillText('TOTAL EARNINGS: $' + earnings, CANVAS_W/2, CANVAS_H/2 + 20);
  const blink = Math.floor(Date.now()/500) % 2 === 0;
  ctx.fillStyle = blink ? '#ffffff' : '#888888';
  ctx.font      = '16px monospace';
  ctx.fillText('PRESS SPACE TO RESTART', CANVAS_W/2, CANVAS_H/2 + 60);
}

// ─── Main Loop ──────────────────────────────────────────────────────────────
function render() {
  const { ox, oy } = getCameraOffset();

  ctx.fillStyle = COLOR.BG;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  drawMap(ox, oy);
  drawWindows(ox, oy);
  drawNeonSigns(ox, oy);
  drawWaypoints(ox, oy);
  drawCops(ox, oy);

  // Player car
  drawCar(CANVAS_W/2, CANVAS_H/2, Player.angle, true);

  // Park countdown ring (drawn at car center on screen)
  if (isParked) {
    drawParkCountdown(CANVAS_W/2, CANVAS_H/2 - CAR_H - 14);
  }

  // Near-cop warning flash at screen edge (parked state — visual stress)
  if (nearCopWarningTimer > 0) {
    const alpha = (nearCopWarningTimer / 30) * 0.55;
    ctx.save();
    ctx.strokeStyle = `rgba(255,0,0,${alpha})`;
    ctx.lineWidth   = 16;
    ctx.strokeRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.restore();
  }

  drawHUD();

  if (gameState === STATE.BUSTED) {
    drawBustedScreen();
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ─── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { keys[e.key] = true;  e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

// ─── Bootstrap ──────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  canvas = document.getElementById('gameCanvas');
  ctx    = canvas.getContext('2d');
  initGame();
  requestAnimationFrame(loop);
});

// ─── Exported Game State ────────────────────────────────────────────────────
const Game = {
  get state()    { return gameState; },
  get earnings() { return earnings; },
  get wanted()   { return wantedLevel; },
  get dropoffs() { return dropoffs; },
  restart()      { initGame(); },
};

// Exports visible at module level: Game, Audio, Player
// Window exports: window.TILE, window.getTile, window.CopPatrolRoutes,
//                 window.NearestCopDistance, window.GameState
</script>
</body>
