<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIGHT SHIFT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas { display: block; image-rendering: pixelated; filter: contrast(1.1) brightness(0.92) saturate(1.15); }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<script>
'use strict';

// ─── Audio Stubs (Hammerz implements these) ────────────────────────────────
const Audio = {
  init() {},
  setEngineSpeed(normalizedSpeed) {},  // 0-1
  playPickup() {},
  playDropoff(earnings) {},
  setCopSiren(wantedLevel) {},         // 0-3
  startAmbience() {},
  setParkState(parked) {},             // called when entering/exiting park state
  setCopProximity(distance) {},        // called each frame with nearest cop distance (999 if no cops)
};

// ─── Constants ─────────────────────────────────────────────────────────────
const CANVAS_W = 800;
const CANVAS_H = 600;

const TILE_SIZE  = 32;
const CITY_TILES = 40;
const CITY_SIZE  = CITY_TILES * TILE_SIZE; // 1280px

const BLOCK_SIZE = 3;
const ROAD_WIDTH = 2;
const PERIOD     = BLOCK_SIZE + ROAD_WIDTH; // 5 tiles per period

// Tile types
const TILE = { ROAD: 0, BUILDING: 1, SIDEWALK: 2, HIDDEN_PARK: 3 };

// Colors
const COLOR = {
  ROAD:        '#1a1a2e',
  SIDEWALK:    '#2a2a3e',
  HIDDEN_PARK: '#0d0d1a',
  ROAD_MARK:   '#ffee00',
  BG:          '#0a0a12',
};
const BUILDING_COLORS = ['#0d0d1a','#1a0d0d','#0d1a0d','#1a1a0d','#0d0d22','#22110d'];
const NEON_COLORS     = ['#ff00aa','#00ffee','#aaff00','#ff6600','#ff0055'];

// Car physics
const CAR_W        = 16;
const CAR_H        = 28;
const MAX_SPEED    = 4.0;
const ACCELERATION = 0.15;
const FRICTION     = 0.92;
const TURN_RATE    = 3;        // degrees per frame

// Game rules
const WORKER_PICKUP_RADIUS  = 20;
const DROP_RADIUS           = 20;
const COP_BUST_RADIUS       = 20;
const COP_CHASE_RADIUS      = 80;   // cop switches to CHASE within this dist (worker in car)
const COP_NEAR_PARK_RADIUS  = 120;  // edge-flash when parked and cop this close
const PARK_SPEED_THRESHOLD  = 0.3;
const PARK_TIMER_DURATION   = 5;    // seconds
const COP_PATROL_SPEED      = 1.5;
const COP_CHASE_SPEED       = 2.8;
const COP_SEARCH_SPEED      = 2.0;
const PATROL_REACH          = 16;   // px to advance patrol index
const DROPOFF_MIN_DIST      = 50;
const DROPOFF_MAX_DIST      = 200;
const MIN_EARNINGS          = 15;
const MAX_EARNINGS          = 40;
const COP_SPAWN_DIST        = 300;
const INITIAL_COP_COUNT     = 2;
const STAR_THRESHOLDS       = [3, 6, 10];
const MAX_STARS             = 3;

// Game phases
const PHASE = {
  FIND_WORKER: 'FIND_WORKER',  // looking for worker on sidewalk
  HAS_WORKER:  'HAS_WORKER',   // worker in car, find hidden park
  PARKED:      'PARKED',       // at hidden park, timer running
  DROPOFF:     'DROPOFF',      // drive to drop-off tile
};

// ─── State ─────────────────────────────────────────────────────────────────
let canvas, ctx;
let map, blockColors, neonSigns, windows;
let hiddenParks = [];  // [{tx, ty, wx, wy}]

const Player = { x: 0, y: 0, vx: 0, vy: 0, angle: 0, speed: 0 };

let workers    = [];   // [{x,y}] sidewalk waypoints
let dropoffPos = null; // {x,y} road tile for drop-off
let earnings   = 0;
let dropoffs   = 0;
let wantedLevel = 0;
let cops       = [];   // full cop objects
let pulse      = 0;

let gamePhase          = PHASE.FIND_WORKER;
let workerInCar        = false;
let isParked           = false;
let parkTimerEnd       = 0;
let parkTimerRemaining = 0;
let dropoffEarnings    = 0;
let nearCopWarningTimer = 0;
let nearestCopDist     = 999;

const keys = {};
const STATE = { INTRO: 'INTRO', PLAYING: 'PLAYING', BUSTED: 'BUSTED' };

// Park countdown flavor text (indexed by Math.ceil(seconds remaining), clamped 0-5)
const PARK_FLAVOR = [
  '✓ Services rendered.',       // 0s
  'Checking hair in mirror...', // 1s
  'Wrapping up...',             // 2s
  'Delivering value...',        // 3s
  'Providing services...',      // 4s
  'Consulting...',              // 5s
];

// Client name roster — assigned round-robin on worker spawn
const CLIENT_NAMES = ['ROXANNE', 'DESTINY', 'BRENDA (ACCTG)', 'MR. CHEN', 'THE GUY'];
let clientNameIndex = 0;

let gameState    = STATE.INTRO;
let bustFlash    = 0;
let audioStarted = false;

// ─── Exports for audio engine ───────────────────────────────────────────────
window.TILE    = TILE;
window.getTile = function(worldX, worldY) {
  const tx = Math.floor(worldX / TILE_SIZE);
  const ty = Math.floor(worldY / TILE_SIZE);
  if (tx < 0 || ty < 0 || tx >= CITY_TILES || ty >= CITY_TILES) return TILE.BUILDING;
  return map[ty][tx];
};

window.CopPatrolRoutes    = [];  // [[{x,y},...], ...] one per cop
window.NearestCopDistance = 999; // live px
window.CopModes           = [];  // live array: cops.map(c => c.mode)

window.GameState = {
  get parked()      { return isParked; },
  get parkTimer()   { return parkTimerRemaining; },
  get workerInCar() { return workerInCar; },
};

// ─── Tile Helpers ───────────────────────────────────────────────────────────
function isRoadCol(tileX) { return (tileX % PERIOD) < ROAD_WIDTH; }
function isRoadRow(tileY) { return (tileY % PERIOD) < ROAD_WIDTH; }

function tilePassable(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= CITY_TILES || ty >= CITY_TILES) return false;
  const t = map[ty][tx];
  return t === TILE.ROAD || t === TILE.HIDDEN_PARK;
}

function isSidewalkTile(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= CITY_TILES || ty >= CITY_TILES) return false;
  return map[ty][tx] === TILE.SIDEWALK;
}

// ─── Map Generation ────────────────────────────────────────────────────────
function generateMap() {
  map = [];
  for (let y = 0; y < CITY_TILES; y++) {
    map[y] = [];
    for (let x = 0; x < CITY_TILES; x++) {
      const rX = isRoadCol(x), rY = isRoadRow(y);
      if (rX || rY) {
        map[y][x] = TILE.ROAD;
      } else {
        const adj = isRoadCol(x-1) || isRoadCol(x+1) || isRoadRow(y-1) || isRoadRow(y+1);
        map[y][x] = adj ? TILE.SIDEWALK : TILE.BUILDING;
      }
    }
  }

  // ── Hidden park tiles (non-intersection corridor tiles) ──────────────────
  const corridors = [];
  for (let y = 2; y < CITY_TILES - 2; y++) {
    for (let x = 2; x < CITY_TILES - 2; x++) {
      if (map[y][x] === TILE.ROAD && !(isRoadCol(x) && isRoadRow(y))) {
        corridors.push({ x, y });
      }
    }
  }
  // Seeded shuffle, pick 7
  const rngH = mulberry32(555);
  for (let i = corridors.length - 1; i > 0; i--) {
    const j = Math.floor(rngH() * (i + 1));
    [corridors[i], corridors[j]] = [corridors[j], corridors[i]];
  }
  hiddenParks = [];
  for (const t of corridors.slice(0, 7)) {
    map[t.y][t.x] = TILE.HIDDEN_PARK;
    hiddenParks.push({
      tx: t.x, ty: t.y,
      wx: t.x * TILE_SIZE + TILE_SIZE / 2,
      wy: t.y * TILE_SIZE + TILE_SIZE / 2,
    });
  }

  // ── Block colors ─────────────────────────────────────────────────────────
  blockColors = [];
  for (let by = 0; by < CITY_TILES; by++) {
    blockColors[by] = [];
    for (let bx = 0; bx < CITY_TILES; bx++) {
      const seed = Math.floor(by / PERIOD) * 100 + Math.floor(bx / PERIOD);
      blockColors[by][bx] = BUILDING_COLORS[seed % BUILDING_COLORS.length];
    }
  }

  // ── Pre-bake windows ─────────────────────────────────────────────────────
  windows = [];
  const rng = mulberry32(42);
  for (let y = 0; y < CITY_TILES; y++) {
    for (let x = 0; x < CITY_TILES; x++) {
      if (map[y][x] !== TILE.BUILDING) continue;
      for (let wy = 4; wy < TILE_SIZE - 4; wy += 6) {
        for (let wx = 4; wx < TILE_SIZE - 4; wx += 6) {
          if (rng() < 0.45) {
            const tier = rng();
            windows.push({
              px: x*TILE_SIZE+wx, py: y*TILE_SIZE+wy,
              bright: tier > 0.4,
              flicker: tier < 0.2,
              phase: rng() * Math.PI * 2,
            });
          }
        }
      }
    }
  }

  // ── Neon signs ───────────────────────────────────────────────────────────
  neonSigns = [];
  const rng2 = mulberry32(99);
  const NAMED_SIGNS = [
    { label: 'VELVET LOUNGE',          color: '#ff00cc' },
    { label: 'EXECUTIVE SUITES',       color: '#00ffee' },
    { label: 'CLUB RENDEZVOUS',        color: '#ff44aa' },
    { label: 'NOCTURNAL TRANSIT',      color: '#ff6600' },
    { label: 'DISCREET SERVICES',      color: '#aa00ff' },
    { label: 'AFTER DARK',             color: '#ff0033' },
    { label: 'THE BACK NINE',          color: '#00ff66' },
    { label: 'PREMIUM ACCOMMODATIONS', color: '#00eeff' },
    { label: 'VACANCY',                color: '#ff2200' },
    { label: 'ROOMS',                  color: '#ffee00' },
    { label: 'TRENCHCOAT TAILORS',     color: '#9933ff' },
    { label: '★ OPEN ★',              color: '#ff00aa' },
    { label: '◈ LOUNGE ◈',            color: '#00ffaa' },
    { label: '24HR',                   color: '#ffcc00' },
    { label: 'LIVE MUSIC',             color: '#ff3388' },
  ];
  const cnt = 12 + Math.floor(rng2() * 7); // 12-18 signs
  for (let i = 0; i < cnt; i++) {
    let tx, ty, tries = 0;
    do { tx = Math.floor(rng2() * CITY_TILES); ty = Math.floor(rng2() * CITY_TILES); tries++; }
    while (map[ty][tx] !== TILE.BUILDING && tries < 300);
    const def = NAMED_SIGNS[i % NAMED_SIGNS.length];
    neonSigns.push({
      px: tx*TILE_SIZE + 1,
      py: ty*TILE_SIZE + 3,
      w: TILE_SIZE - 2,
      h: 12,
      color: def.color,
      label: def.label,
    });
  }
}

function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─── Position Helpers ────────────────────────────────────────────────────────
function randomRoadPos() {
  let tx, ty, tries = 0;
  do {
    tx = Math.floor(Math.random() * CITY_TILES);
    ty = Math.floor(Math.random() * CITY_TILES);
    tries++;
  } while (!tilePassable(tx, ty) && tries < 500);
  return { x: tx*TILE_SIZE + TILE_SIZE/2, y: ty*TILE_SIZE + TILE_SIZE/2 };
}

function randomRoadPosFarFrom(px, py, minDist) {
  let pos, tries = 0;
  do { pos = randomRoadPos(); tries++; }
  while (dist(pos.x, pos.y, px, py) < minDist && tries < 200);
  return pos;
}

function randomRoadPosNear(px, py, radius) {
  // Pick a random road tile within `radius` px of (px, py)
  let tries = 0;
  while (tries < 200) {
    const angle = Math.random() * Math.PI * 2;
    const r     = 20 + Math.random() * radius;
    const wx    = px + Math.cos(angle) * r;
    const wy    = py + Math.sin(angle) * r;
    const tx    = Math.floor(wx / TILE_SIZE);
    const ty    = Math.floor(wy / TILE_SIZE);
    if (tilePassable(tx, ty)) {
      return { x: tx * TILE_SIZE + TILE_SIZE / 2, y: ty * TILE_SIZE + TILE_SIZE / 2 };
    }
    tries++;
  }
  // fallback: any road tile
  return randomRoadPos();
}

function randomRoadPosBetween(px, py, minD, maxD) {
  let pos, tries = 0;
  do {
    pos = randomRoadPos();
    const d = dist(pos.x, pos.y, px, py);
    if (d >= minD && d <= maxD) return pos;
    tries++;
  } while (tries < 300);
  return randomRoadPosFarFrom(px, py, minD);
}

function randomSidewalkPos() {
  let tx, ty, tries = 0;
  do {
    tx = Math.floor(Math.random() * CITY_TILES);
    ty = Math.floor(Math.random() * CITY_TILES);
    tries++;
  } while (!isSidewalkTile(tx, ty) && tries < 500);
  return { x: tx*TILE_SIZE + TILE_SIZE/2, y: ty*TILE_SIZE + TILE_SIZE/2 };
}

function randomSidewalkPosFarFrom(px, py, minDist) {
  let pos, tries = 0;
  do { pos = randomSidewalkPos(); tries++; }
  while (dist(pos.x, pos.y, px, py) < minDist && tries < 200);
  return pos;
}

// ─── Math Helpers ───────────────────────────────────────────────────────────
function dist(ax, ay, bx, by) {
  const dx = bx-ax, dy = by-ay;
  return Math.sqrt(dx*dx + dy*dy);
}
function degToRad(d) { return d * Math.PI / 180; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ─── Collision ──────────────────────────────────────────────────────────────
function isBuildingAt(wx, wy) {
  const tx = Math.floor(wx / TILE_SIZE), ty = Math.floor(wy / TILE_SIZE);
  if (tx < 0 || ty < 0 || tx >= CITY_TILES || ty >= CITY_TILES) return true;
  return map[ty][tx] === TILE.BUILDING;
}
function carOverlapsBuilding(cx, cy) {
  const hw = CAR_W/2, hh = CAR_H/2;
  return [[cx-hw,cy-hh],[cx+hw,cy-hh],[cx-hw,cy+hh],[cx+hw,cy+hh]]
    .some(([x,y]) => isBuildingAt(x,y));
}

// ─── Park Cop Nudge ──────────────────────────────────────────────────────────
let parkNudgeTimer = 0; // counts down frames; removes temp waypoints at 0

function triggerParkCopNudge() {
  // Pick the non-CHASE cop closest to the player
  let bestCop  = null;
  let bestDist = Infinity;
  for (const c of cops) {
    if (c.mode === 'CHASE') continue;
    const d = dist(c.x, c.y, Player.x, Player.y);
    if (d < bestDist) { bestDist = d; bestCop = c; }
  }
  if (!bestCop) return;

  // Pick a road tile 80-100px from the player in a random direction
  let nudgePt = null;
  for (let tries = 0; tries < 200; tries++) {
    const angle = Math.random() * Math.PI * 2;
    const r     = 80 + Math.random() * 20; // 80-100px
    const wx    = Player.x + Math.cos(angle) * r;
    const wy    = Player.y + Math.sin(angle) * r;
    const tx    = Math.floor(wx / TILE_SIZE);
    const ty    = Math.floor(wy / TILE_SIZE);
    if (tilePassable(tx, ty)) {
      nudgePt = { x: tx * TILE_SIZE + TILE_SIZE / 2, y: ty * TILE_SIZE + TILE_SIZE / 2, isTemp: true };
      break;
    }
  }
  if (!nudgePt) return;

  // Insert at the FRONT of patrolPoints
  bestCop.patrolPoints.unshift(nudgePt);
  bestCop.patrolIndex      = 0;
  bestCop.usingTempWaypoint = true;
  parkNudgeTimer = 360; // 6 seconds
}

// ─── Cop Export Update ──────────────────────────────────────────────────────
function updateCopExports() {
  window.CopModes = cops.map(c => c.mode);
  window.CopPatrolRoutes = cops.map(c => {
    const route = c.patrolPoints.slice();
    if (c.mode === 'SEARCH') {
      route.unshift({ x: c.lastKnownX, y: c.lastKnownY, isLastKnown: true });
    }
    return route;
  });
}

// ─── Cop Patrol Generation ───────────────────────────────────────────────────
function generatePatrolRoute(startX, startY, n) {
  const route = [];
  let cx = startX, cy = startY;
  for (let i = 0; i < n; i++) {
    const p = randomRoadPosFarFrom(cx, cy, 100);
    route.push({ x: p.x, y: p.y });
    cx = p.x; cy = p.y;
  }
  return route;
}

// ─── Cop Spawning ───────────────────────────────────────────────────────────
function spawnCops(targetCount) {
  while (cops.length < targetCount) {
    const pos    = randomRoadPosFarFrom(Player.x, Player.y, COP_SPAWN_DIST);
    const nPts   = 3 + Math.floor(Math.random() * 3);
    const patrol = generatePatrolRoute(pos.x, pos.y, nPts);
    cops.push({
      x: pos.x, y: pos.y,
      vx: 0, vy: 0,
      angle: 0,
      patrolPoints: patrol,
      patrolIndex:  0,
      mode: 'PATROL',
      // SEARCH state fields
      lastKnownX: 0,
      lastKnownY: 0,
      searchTimer: 0,
      searchTarget: null,
      // temp waypoint state
      usingTempWaypoint: false,
    });
  }
  while (cops.length > targetCount) cops.pop();
  updateCopExports();
}

function updateWanted() {
  let lvl = 0;
  for (let i = 0; i < STAR_THRESHOLDS.length; i++) {
    if (dropoffs >= STAR_THRESHOLDS[i]) lvl = i + 1;
  }
  if (lvl !== wantedLevel) {
    wantedLevel = lvl;
    Audio.setCopSiren(wantedLevel);
    spawnCops(INITIAL_COP_COUNT + wantedLevel);
  }
}

// ─── Game Init ───────────────────────────────────────────────────────────────
function initGame() {
  generateMap();

  const sp   = randomRoadPos();
  Player.x   = sp.x; Player.y = sp.y;
  Player.vx  = 0;    Player.vy = 0;
  Player.angle = 0;  Player.speed = 0;

  clientNameIndex = 0;
  workers   = [];
  for (let i = 0; i < 2; i++) {
    const pos = randomSidewalkPosFarFrom(Player.x, Player.y, 80);
    pos.clientName = CLIENT_NAMES[clientNameIndex % CLIENT_NAMES.length];
    clientNameIndex++;
    workers.push(pos);
  }

  dropoffPos          = null;
  earnings            = 0;
  dropoffs            = 0;
  wantedLevel         = 0;
  cops                = [];
  pulse               = 0;
  gameState           = STATE.PLAYING; // INTRO → PLAYING is handled separately
  bustFlash           = 0;
  gamePhase           = PHASE.FIND_WORKER;
  workerInCar         = false;
  isParked            = false;
  parkTimerEnd        = 0;
  parkTimerRemaining  = 0;
  dropoffEarnings     = 0;
  nearCopWarningTimer = 0;
  nearestCopDist      = 999;

  window.NearestCopDistance = 999;
  window.CopModes           = [];
  parkNudgeTimer            = 0;
  spawnCops(INITIAL_COP_COUNT);
}

// ─── Update ─────────────────────────────────────────────────────────────────
function update() {
  if (gameState === STATE.INTRO) {
    if (Object.keys(keys).some(k => keys[k])) {
      gameState = STATE.PLAYING;
      Audio.init();
      Audio.startAmbience();
      audioStarted = true;
    }
    return;
  }

  if (gameState === STATE.BUSTED) {
    if (bustFlash > 0) bustFlash--;
    if (Object.keys(keys).some(k => keys[k])) initGame();
    return;
  }

  if (!audioStarted && Object.keys(keys).some(k => keys[k])) {
    Audio.init();
    Audio.startAmbience();
    audioStarted = true;
  }

  pulse += 0.08;

  // ── Steering ──────────────────────────────────────────────────────────────
  const moving = Math.abs(Player.speed) > 0.1;
  if (moving && gamePhase !== PHASE.PARKED) {
    if (keys['ArrowLeft']  || keys['a'] || keys['A']) Player.angle -= TURN_RATE * (Player.speed / MAX_SPEED);
    if (keys['ArrowRight'] || keys['d'] || keys['D']) Player.angle += TURN_RATE * (Player.speed / MAX_SPEED);
  }

  // ── Throttle ──────────────────────────────────────────────────────────────
  if (gamePhase !== PHASE.PARKED) {
    const rad  = degToRad(Player.angle);
    const fwdX = Math.sin(rad), fwdY = -Math.cos(rad);
    if (keys['ArrowUp']   || keys['w'] || keys['W']) { Player.vx += fwdX * ACCELERATION;       Player.vy += fwdY * ACCELERATION; }
    if (keys['ArrowDown'] || keys['s'] || keys['S']) { Player.vx -= fwdX * ACCELERATION * 0.6; Player.vy -= fwdY * ACCELERATION * 0.6; }
  }

  // ── Friction & speed cap ──────────────────────────────────────────────────
  Player.vx *= FRICTION;
  Player.vy *= FRICTION;
  const spd = Math.sqrt(Player.vx*Player.vx + Player.vy*Player.vy);
  if (spd > MAX_SPEED) { Player.vx = (Player.vx/spd)*MAX_SPEED; Player.vy = (Player.vy/spd)*MAX_SPEED; }
  Player.speed = spd;

  // ── Move & collide ────────────────────────────────────────────────────────
  const nx = Player.x + Player.vx, ny = Player.y + Player.vy;
  if      (!carOverlapsBuilding(nx, ny))       { Player.x = nx; Player.y = ny; }
  else if (!carOverlapsBuilding(nx, Player.y)) { Player.x = nx; Player.vy = 0; }
  else if (!carOverlapsBuilding(Player.x, ny)) { Player.y = ny; Player.vx = 0; }
  else                                          { Player.vx = 0; Player.vy = 0; }
  Player.x = clamp(Player.x, CAR_W/2, CITY_SIZE - CAR_W/2);
  Player.y = clamp(Player.y, CAR_H/2, CITY_SIZE - CAR_H/2);

  Audio.setEngineSpeed(Player.speed / MAX_SPEED);

  // ── Phase logic ───────────────────────────────────────────────────────────
  if (gamePhase === PHASE.FIND_WORKER) {
    for (let i = workers.length - 1; i >= 0; i--) {
      if (dist(Player.x, Player.y, workers[i].x, workers[i].y) < WORKER_PICKUP_RADIUS) {
        workers.splice(i, 1);
        workerInCar = true;
        gamePhase   = PHASE.HAS_WORKER;
        Audio.playPickup();
        break;
      }
    }

  } else if (gamePhase === PHASE.HAS_WORKER) {
    const ptx = Math.floor(Player.x / TILE_SIZE);
    const pty = Math.floor(Player.y / TILE_SIZE);
    const onHiddenPark = map[pty] && map[pty][ptx] === TILE.HIDDEN_PARK;
    if (onHiddenPark && Player.speed < PARK_SPEED_THRESHOLD) {
      // Enter park state
      gamePhase          = PHASE.PARKED;
      isParked           = true;
      parkTimerEnd       = Date.now() + PARK_TIMER_DURATION * 1000;
      parkTimerRemaining = PARK_TIMER_DURATION;
      Player.vx = 0; Player.vy = 0;
      Audio.setParkState(true);
      // Hidden spot: CHASE cops → SEARCH, PATROL cops stay PATROL
      for (const c of cops) {
        if (c.mode === 'CHASE') {
          c.lastKnownX  = Player.x;
          c.lastKnownY  = Player.y;
          c.searchTimer = 720; // 12 * 60 frames
          c.searchTarget = null;
          c.mode        = 'SEARCH';
        }
        // PATROL stays PATROL
      }
      // Park window cop nudge: pick closest non-CHASE cop and give temp waypoint
      triggerParkCopNudge();
    }

  } else if (gamePhase === PHASE.PARKED) {
    const now = Date.now();
    parkTimerRemaining = Math.max(0, (parkTimerEnd - now) / 1000);
    if (parkTimerRemaining <= 0) {
      isParked    = false;
      workerInCar = false;
      gamePhase   = PHASE.DROPOFF;
      Audio.setParkState(false);
      dropoffEarnings = MIN_EARNINGS + Math.floor(Math.random() * (MAX_EARNINGS - MIN_EARNINGS + 1));
      dropoffPos  = randomRoadPosBetween(Player.x, Player.y, DROPOFF_MIN_DIST, DROPOFF_MAX_DIST);
    }

  } else if (gamePhase === PHASE.DROPOFF) {
    if (dropoffPos && dist(Player.x, Player.y, dropoffPos.x, dropoffPos.y) < DROP_RADIUS) {
      earnings  += dropoffEarnings;
      dropoffs++;
      Audio.playDropoff(dropoffEarnings);
      dropoffPos = null;
      gamePhase  = PHASE.FIND_WORKER;
      const newWorker = randomSidewalkPosFarFrom(Player.x, Player.y, 80);
      newWorker.clientName = CLIENT_NAMES[clientNameIndex % CLIENT_NAMES.length];
      clientNameIndex++;
      workers.push(newWorker);
      updateWanted();
    }
  }

  // ── Park nudge timer ──────────────────────────────────────────────────────
  if (parkNudgeTimer > 0) {
    parkNudgeTimer--;
    if (parkNudgeTimer === 0) {
      // Remove temp waypoints from all cops
      for (const c of cops) {
        if (c.usingTempWaypoint) {
          // Remove the first temp waypoint from patrolPoints
          const idx = c.patrolPoints.findIndex(p => p.isTemp);
          if (idx !== -1) c.patrolPoints.splice(idx, 1);
          // Keep patrolIndex in bounds
          if (c.patrolIndex >= c.patrolPoints.length) c.patrolIndex = 0;
          c.usingTempWaypoint = false;
        }
      }
    }
  }

  // ── Cop AI ────────────────────────────────────────────────────────────────
  nearestCopDist = 999;

  for (const cop of cops) {
    const pd = dist(cop.x, cop.y, Player.x, Player.y);
    if (pd < nearestCopDist) nearestCopDist = pd;

    // ── Mode switching ────────────────────────────────────────────────────
    if (cop.mode === 'CHASE') {
      if (isParked) {
        // Player just parked (hidden) — transition to SEARCH
        cop.lastKnownX  = Player.x;
        cop.lastKnownY  = Player.y;
        cop.searchTimer = 720;
        cop.searchTarget = null;
        cop.mode        = 'SEARCH';
      } else if (!workerInCar || pd > COP_CHASE_RADIUS * 2) {
        // Lost sight of player (drove away or dropped worker)
        cop.lastKnownX  = Player.x;
        cop.lastKnownY  = Player.y;
        cop.searchTimer = 720;
        cop.searchTarget = null;
        cop.mode        = 'SEARCH';
      }
    } else if (cop.mode === 'SEARCH') {
      // Can re-enter CHASE if player is visible (worker in car, not parked, close)
      if (!isParked && workerInCar && pd < COP_CHASE_RADIUS) {
        cop.mode = 'CHASE';
      }
    } else {
      // PATROL: can enter CHASE only if player is visible (not parked, worker in car)
      if (!isParked && workerInCar && pd < COP_CHASE_RADIUS) {
        cop.mode = 'CHASE';
      }
    }

    // ── Movement by mode ──────────────────────────────────────────────────
    if (cop.mode === 'PATROL') {
      if (cop.patrolPoints.length === 0) { cop.vx = 0; cop.vy = 0; }
      else {
        const tgt = cop.patrolPoints[cop.patrolIndex];
        const dx  = tgt.x - cop.x, dy = tgt.y - cop.y;
        const d   = Math.sqrt(dx*dx + dy*dy);
        if (d < PATROL_REACH) {
          // Advance; if we reached a temp waypoint, clear it
          if (tgt.isTemp && cop.usingTempWaypoint) {
            cop.patrolPoints.splice(cop.patrolIndex, 1);
            cop.usingTempWaypoint = false;
            if (cop.patrolPoints.length === 0) { cop.vx = 0; cop.vy = 0; }
            else cop.patrolIndex = cop.patrolIndex % cop.patrolPoints.length;
          } else {
            cop.patrolIndex = (cop.patrolIndex + 1) % cop.patrolPoints.length;
          }
        } else {
          cop.vx    = (dx/d) * COP_PATROL_SPEED;
          cop.vy    = (dy/d) * COP_PATROL_SPEED;
          cop.angle = Math.atan2(dx, -dy) * 180 / Math.PI;
        }
      }

    } else if (cop.mode === 'SEARCH') {
      cop.searchTimer--;

      if (cop.searchTimer <= 0) {
        cop.mode = 'PATROL';
        cop.searchTarget = null;
      } else {
        const isNearHiddenPark = isParked && dist(cop.x, cop.y, Player.x, Player.y) < 40;

        // Pick a target: either lastKnown or a sweep tile
        if (!cop.searchTarget) {
          const dToLK = dist(cop.x, cop.y, cop.lastKnownX, cop.lastKnownY);
          if (dToLK > 32) {
            cop.searchTarget = { x: cop.lastKnownX, y: cop.lastKnownY };
          } else {
            // Arrived at lastKnown — sweep nearby road tiles
            cop.searchTarget = randomRoadPosNear(cop.lastKnownX, cop.lastKnownY, 80);
          }
        }

        // If near hidden park, just mill around — don't bust
        if (isNearHiddenPark) {
          cop.searchTarget = randomRoadPosNear(cop.x, cop.y, 60);
        }

        const dx = cop.searchTarget.x - cop.x;
        const dy = cop.searchTarget.y - cop.y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if (d < PATROL_REACH) {
          cop.searchTarget = null; // pick a new one next frame
        } else {
          cop.vx    = (dx/d) * COP_SEARCH_SPEED;
          cop.vy    = (dy/d) * COP_SEARCH_SPEED;
          cop.angle = Math.atan2(dx, -dy) * 180 / Math.PI;
        }
      }

    } else {
      // CHASE
      const dx = Player.x - cop.x, dy = Player.y - cop.y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d > 0) {
        cop.vx    = (dx/d) * COP_CHASE_SPEED;
        cop.vy    = (dy/d) * COP_CHASE_SPEED;
        cop.angle = Math.atan2(dx, -dy) * 180 / Math.PI;
      }
    }

    cop.x += cop.vx;
    cop.y += cop.vy;

    // BUST: cop reaches player while worker is in car AND not in hidden park
    if (workerInCar && !isParked && pd < COP_BUST_RADIUS) {
      gameState = STATE.BUSTED;
      bustFlash = 30;
      Audio.setCopSiren(0);
      Audio.setParkState(false);
      return;
    }
  }

  window.NearestCopDistance = nearestCopDist;
  Audio.setCopProximity(nearestCopDist);
  updateCopExports();

  // Near-cop warning while parked (visual stress, no bust)
  if (isParked && nearestCopDist < COP_NEAR_PARK_RADIUS) nearCopWarningTimer = 30;
  if (nearCopWarningTimer > 0) nearCopWarningTimer--;
}

// ─── Rendering ──────────────────────────────────────────────────────────────
function getCameraOffset() {
  return {
    ox: Math.round(Player.x - CANVAS_W / 2),
    oy: Math.round(Player.y - CANVAS_H / 2),
  };
}

function drawMap(ox, oy) {
  const startTX = Math.max(0, Math.floor(ox / TILE_SIZE));
  const startTY = Math.max(0, Math.floor(oy / TILE_SIZE));
  const endTX   = Math.min(CITY_TILES-1, Math.ceil((ox+CANVAS_W) / TILE_SIZE));
  const endTY   = Math.min(CITY_TILES-1, Math.ceil((oy+CANVAS_H) / TILE_SIZE));

  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      const sx = tx*TILE_SIZE - ox, sy = ty*TILE_SIZE - oy;
      const t  = map[ty][tx];

      if (t === TILE.HIDDEN_PARK) {
        ctx.fillStyle = COLOR.HIDDEN_PARK;
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
        // Faint purple glow border
        ctx.save();
        ctx.shadowColor = '#4400aa';
        ctx.shadowBlur  = 8;
        ctx.strokeStyle = 'rgba(80,0,180,0.25)';
        ctx.lineWidth   = 1;
        ctx.strokeRect(sx+0.5, sy+0.5, TILE_SIZE-1, TILE_SIZE-1);
        ctx.restore();
        // Subtle discovery marker
        ctx.save();
        ctx.globalAlpha  = 0.2;
        ctx.fillStyle    = '#8844cc';
        ctx.font         = '8px monospace';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('▮', sx + TILE_SIZE/2, sy + TILE_SIZE/2);
        ctx.textBaseline = 'alphabetic';
        ctx.globalAlpha  = 1;
        ctx.restore();
      } else if (t === TILE.ROAD) {
        ctx.fillStyle = COLOR.ROAD;
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
      } else if (t === TILE.SIDEWALK) {
        ctx.fillStyle = COLOR.SIDEWALK;
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
      } else {
        ctx.fillStyle = blockColors[ty][tx];
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
      }
    }
  }

  // Streetlight pools at intersections
  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      if (!isRoadCol(tx) || !isRoadRow(ty)) continue;
      const sx = tx * TILE_SIZE + TILE_SIZE / 2 - ox;
      const sy = ty * TILE_SIZE + TILE_SIZE / 2 - oy;
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, 40);
      grad.addColorStop(0,   'rgba(255,240,180,0.06)');
      grad.addColorStop(1,   'rgba(255,240,180,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(sx - 40, sy - 40, 80, 80);
    }
  }

  // Road dashes (also on HIDDEN_PARK for visual continuity)
  ctx.strokeStyle = COLOR.ROAD_MARK;
  ctx.lineWidth   = 1;
  ctx.setLineDash([6, 10]);

  const roadLike = (r, c) =>
    r >= 0 && r < CITY_TILES && c >= 0 && c < CITY_TILES &&
    (map[r][c] === TILE.ROAD || map[r][c] === TILE.HIDDEN_PARK);

  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      const t = map[ty][tx];
      if (t !== TILE.ROAD && t !== TILE.HIDDEN_PARK) continue;
      const sx = tx*TILE_SIZE - ox, sy = ty*TILE_SIZE - oy;
      const h  = roadLike(ty-1, tx) && roadLike(ty+1, tx);
      const v  = roadLike(ty, tx-1) && roadLike(ty, tx+1);
      if (h && !v) {
        ctx.beginPath(); ctx.moveTo(sx+TILE_SIZE/2, sy); ctx.lineTo(sx+TILE_SIZE/2, sy+TILE_SIZE); ctx.stroke();
      } else if (v && !h) {
        ctx.beginPath(); ctx.moveTo(sx, sy+TILE_SIZE/2); ctx.lineTo(sx+TILE_SIZE, sy+TILE_SIZE/2); ctx.stroke();
      }
    }
  }
  ctx.setLineDash([]);
}

function drawWindows(ox, oy) {
  for (const w of windows) {
    if (w.px < ox || w.px > ox+CANVAS_W || w.py < oy || w.py > oy+CANVAS_H) continue;
    let alpha = 1;
    if (w.flicker) {
      alpha = 0.6 + 0.4 * Math.sin(pulse * 2.3 + w.phase);
    }
    ctx.globalAlpha = alpha;
    ctx.fillStyle = w.bright ? '#ffffcc' : '#ffee88';
    ctx.fillRect(w.px-ox, w.py-oy, 2, 2);
  }
  ctx.globalAlpha = 1;
}

function drawNeonSigns(ox, oy) {
  for (const n of neonSigns) {
    const sx = n.px - ox, sy = n.py - oy;
    if (sx + n.w < 0 || sx > CANVAS_W || sy + n.h < 0 || sy > CANVAS_H) continue;

    ctx.save();

    // Chromatic aberration: red glow shifted +1px right, blue glow -1px left
    ctx.globalAlpha = 0.3;
    ctx.shadowBlur  = 10;
    ctx.shadowColor = '#ff0000';
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth   = 1.5;
    ctx.strokeRect(sx + 1, sy, n.w, n.h);
    ctx.shadowColor = '#0000ff';
    ctx.strokeStyle = '#0000ff';
    ctx.strokeRect(sx - 1, sy, n.w, n.h);
    ctx.globalAlpha = 1;

    // Main glow and fill
    ctx.shadowColor = n.color;
    ctx.shadowBlur  = 14;
    ctx.fillStyle   = n.color + '44';
    ctx.fillRect(sx, sy, n.w, n.h);
    ctx.strokeStyle = n.color;
    ctx.lineWidth   = 1.5;
    ctx.strokeRect(sx, sy, n.w, n.h);

    // Label text
    if (n.label) {
      ctx.shadowBlur   = 6;
      ctx.shadowColor  = n.color;
      ctx.fillStyle    = n.color;
      ctx.font         = '8px monospace';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(n.label, sx + n.w / 2, sy + n.h / 2);
      ctx.textBaseline = 'alphabetic';
    }

    ctx.restore();
  }
}

function drawWaypoints(ox, oy) {
  const p = 0.6 + 0.4 * Math.sin(pulse);
  const r = 10  + 4   * Math.sin(pulse);

  // Worker waypoints (sidewalk curb)
  for (const w of workers) {
    const sx = w.x - ox, sy = w.y - oy;
    if (sx < -60 || sx > CANVAS_W+60 || sy < -60 || sy > CANVAS_H+60) continue;
    ctx.save();
    ctx.globalAlpha = p;
    ctx.shadowColor = '#00ff55'; ctx.shadowBlur = 20;
    ctx.strokeStyle = '#00ff55'; ctx.lineWidth  = 2;
    ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
    // Person icon
    ctx.save();
    ctx.fillStyle = '#00ff88';
    ctx.font      = '14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('◉', sx, sy);
    ctx.textBaseline = 'alphabetic';
    ctx.font    = '8px monospace';
    ctx.fillStyle = '#00ff55';
    ctx.fillText(w.clientName || 'CLIENT', sx, sy - r - 4);
    ctx.restore();
  }

  // Drop-off waypoint (after parking transaction)
  if (gamePhase === PHASE.DROPOFF && dropoffPos) {
    const sx = dropoffPos.x - ox, sy = dropoffPos.y - oy;
    if (sx >= -60 && sx <= CANVAS_W+60 && sy >= -60 && sy <= CANVAS_H+60) {
      ctx.save();
      ctx.globalAlpha = p;
      ctx.shadowColor = '#ffee00'; ctx.shadowBlur = 20;
      ctx.strokeStyle = '#ffee00'; ctx.lineWidth  = 2;
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
      ctx.fillStyle = '#ffee55';
      ctx.font      = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('DROP-OFF', sx, sy - r - 4);
    }
  }
}

function drawCar(cx, cy, angle, isPlayer) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(degToRad(angle));

  if (isPlayer) {
    ctx.fillStyle = '#dddddd';
    ctx.fillRect(-CAR_W/2, -CAR_H/2, CAR_W, CAR_H);
    ctx.fillStyle = '#ffee55';
    ctx.fillRect(-CAR_W/2+2, -CAR_H/2, 4, 3);
    ctx.fillRect(CAR_W/2-6,  -CAR_H/2, 4, 3);
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(-CAR_W/2+2, CAR_H/2-3, 4, 3);
    ctx.fillRect(CAR_W/2-6,  CAR_H/2-3, 4, 3);
    ctx.fillStyle = '#334455';
    ctx.fillRect(-CAR_W/2+3, -CAR_H/2+4, CAR_W-6, 6);
  } else {
    ctx.save();
    ctx.shadowColor = '#0088ff'; ctx.shadowBlur = 12;
    ctx.fillStyle   = '#aaccff';
    ctx.fillRect(-CAR_W/2, -CAR_H/2, CAR_W, CAR_H);
    ctx.restore();
    ctx.fillStyle = '#0044cc';
    ctx.fillRect(-CAR_W/2+3, -CAR_H/2+4, CAR_W-6, 5);
    ctx.fillRect(-CAR_W/2+3, CAR_H/2-9,  CAR_W-6, 5);
    // Siren flash — alternates only in CHASE mode
    ctx.fillStyle = Math.sin(pulse*3) > 0 ? '#ff0000' : '#0000ff';
    ctx.fillRect(-4, -CAR_H/2-3, 8, 3);
  }
  ctx.restore();
}

function drawCops(ox, oy) {
  for (const cop of cops) {
    const sx = cop.x - ox, sy = cop.y - oy;
    if (sx < -60 || sx > CANVAS_W+60 || sy < -60 || sy > CANVAS_H+60) continue;
    drawCar(sx, sy, cop.angle, false);
  }
}

// Draw circular park countdown at car screen position
function drawParkCountdown(screenX, screenY) {
  const elapsed  = PARK_TIMER_DURATION - parkTimerRemaining;
  const progress = elapsed / PARK_TIMER_DURATION; // 0→1 as timer runs down
  const radius   = 22;
  const start    = -Math.PI / 2;
  const end      = start + (1 - progress) * Math.PI * 2;

  ctx.save();
  // Outer ring background
  ctx.beginPath();
  ctx.arc(screenX, screenY, radius, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(80,0,180,0.4)';
  ctx.lineWidth   = 5;
  ctx.stroke();

  // Remaining arc (depleting)
  if (parkTimerRemaining > 0) {
    ctx.beginPath();
    ctx.arc(screenX, screenY, radius, start, end, false);
    const frac = parkTimerRemaining / PARK_TIMER_DURATION;
    ctx.strokeStyle = frac > 0.5 ? '#cc44ff' : frac > 0.25 ? '#ff8800' : '#ff2200';
    ctx.lineWidth   = 4;
    ctx.shadowColor = ctx.strokeStyle;
    ctx.shadowBlur  = 10;
    ctx.stroke();
  }

  // Tick text inside
  ctx.fillStyle    = '#cc88ff';
  ctx.font         = 'bold 11px monospace';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  const _fi = Math.min(5, Math.ceil(parkTimerRemaining)); ctx.font = "bold 9px monospace"; ctx.fillText(PARK_FLAVOR[_fi], screenX, screenY);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

function drawHUD() {
  // ── Top left: earnings ───────────────────────────────────────────────────
  ctx.fillStyle = '#00ff55';
  ctx.font      = 'bold 20px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('$' + earnings, 14, 28);

  // ── Passenger status ─────────────────────────────────────────────────────
  if (workerInCar || isParked) {
    ctx.save();
    ctx.fillStyle  = '#ff9944';
    ctx.font       = 'bold 12px monospace';
    ctx.textAlign  = 'left';
    ctx.shadowColor = '#ff6600';
    ctx.shadowBlur  = 8;
    ctx.fillText('CLIENT: ABOARD', 14, 46);
    ctx.restore();
  } else if (gamePhase === PHASE.FIND_WORKER && workers.length > 0) {
    // Hint arrow toward nearest worker
    const w   = workers[0];
    const dx  = w.x - Player.x, dy = w.y - Player.y;
    const a   = Math.atan2(dx, -dy);
    ctx.fillStyle = '#00ff88';
    ctx.font      = '11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('CLIENT AVAILABLE ' + angleToArrow(a), 14, 46);
  }

  // ── Top right: wanted stars ───────────────────────────────────────────────
  ctx.font      = '22px monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i < MAX_STARS; i++) {
    ctx.fillStyle = i < wantedLevel ? '#ffee00' : '#333333';
    ctx.fillText(i < wantedLevel ? '★' : '☆', CANVAS_W - 14 - (MAX_STARS-1-i)*26, 28);
  }

  // ── Bottom left: title ───────────────────────────────────────────────────
  ctx.fillStyle = '#666666';
  ctx.font      = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('NOCTURNAL TRANSIT LLC', 14, CANVAS_H - 14);

  // ── Bottom center: park timer HUD OR speed bar ───────────────────────────
  const BAR_W = 120, BAR_H = 8;
  const bx    = (CANVAS_W - BAR_W) / 2;
  const by    = CANVAS_H - 22;

  if (isParked) {
    // Show park countdown bar in HUD
    const frac = parkTimerRemaining / PARK_TIMER_DURATION;
    ctx.fillStyle = '#111122';
    ctx.fillRect(bx, by, BAR_W, BAR_H);
    const barCol = frac > 0.5 ? '#cc44ff' : frac > 0.25 ? '#ff8800' : '#ff2200';
    ctx.fillStyle = barCol;
    ctx.fillRect(bx, by, BAR_W * frac, BAR_H);
    ctx.strokeStyle = '#552288';
    ctx.lineWidth   = 1;
    ctx.strokeRect(bx, by, BAR_W, BAR_H);
    ctx.fillStyle   = '#aa66cc';
    ctx.font        = '10px monospace';
    ctx.textAlign   = 'center';
    const flavorIdx = Math.min(5, Math.ceil(parkTimerRemaining));
    ctx.fillText(PARK_FLAVOR[flavorIdx], CANVAS_W/2, CANVAS_H - 10);
  } else {
    // Normal speed bar
    const sr   = Player.speed / MAX_SPEED;
    const sCol = sr > 0.8 ? '#ff4400' : sr > 0.5 ? '#ffaa00' : '#00ff88';
    ctx.fillStyle = '#222233';
    ctx.fillRect(bx, by, BAR_W, BAR_H);
    ctx.fillStyle = sCol;
    ctx.fillRect(bx, by, BAR_W * sr, BAR_H);
    ctx.strokeStyle = '#444455';
    ctx.lineWidth   = 1;
    ctx.strokeRect(bx, by, BAR_W, BAR_H);
    ctx.fillStyle   = '#555566';
    ctx.font        = '10px monospace';
    ctx.textAlign   = 'center';
    ctx.fillText('SPD', CANVAS_W/2, CANVAS_H - 10);
  }
}

function angleToArrow(rad) {
  const deg    = ((rad * 180 / Math.PI) + 360) % 360;
  const arrows = ['↑','↗','→','↘','↓','↙','←','↖'];
  return arrows[Math.round(deg / 45) % 8];
}

function drawIntroScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.92)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#ffffff';
  ctx.font      = 'bold 72px monospace';
  ctx.save();
  ctx.shadowColor = '#8800ff';
  ctx.shadowBlur  = 24;
  ctx.fillText('NIGHT SHIFT', CANVAS_W/2, CANVAS_H/2 - 50);
  ctx.restore();

  // Tagline
  ctx.fillStyle = '#aaaacc';
  ctx.font      = '16px monospace';
  ctx.fillText('Premium Nocturnal Transportation Services', CANVAS_W/2, CANVAS_H/2 + 4);

  // Blinking prompt
  const blink = Math.floor(Date.now()/600) % 2 === 0;
  ctx.fillStyle = blink ? '#00ff88' : '#005533';
  ctx.font      = '14px monospace';
  ctx.fillText('PRESS ANY KEY TO BEGIN SHIFT', CANVAS_W/2, CANVAS_H/2 + 52);
}

function drawBustedScreen() {
  if (bustFlash > 0) {
    ctx.fillStyle = `rgba(255,0,0,${bustFlash/30*0.7})`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    return;
  }
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.textAlign = 'center';

  // Title
  ctx.fillStyle = '#ffffff';
  ctx.font      = 'bold 52px monospace';
  ctx.fillText('SERVICE TERMINATED', CANVAS_W/2, CANVAS_H/2 - 80);

  // Red rule
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(CANVAS_W/2 - 180, CANVAS_H/2 - 58, 360, 3);

  // Subtitle
  ctx.fillStyle = '#ff4422';
  ctx.font      = 'bold 16px monospace';
  ctx.fillText('REGULATORY INTERVENTION', CANVAS_W/2, CANVAS_H/2 - 38);

  // Body text
  ctx.fillStyle = '#cccccc';
  ctx.font      = '13px monospace';
  ctx.fillText('Officer Schmidt has some questions.', CANVAS_W/2, CANVAS_H/2 - 8);
  ctx.fillText('You explain that you operate a premium nocturnal transportation service.', CANVAS_W/2, CANVAS_H/2 + 12);
  ctx.fillText('Officer Schmidt does not find this compelling.', CANVAS_W/2, CANVAS_H/2 + 32);

  // Earnings
  ctx.fillStyle = '#00ff55';
  ctx.font      = 'bold 20px monospace';
  ctx.fillText('TOTAL REVENUE: $' + earnings, CANVAS_W/2, CANVAS_H/2 + 62);

  // Blink restart + lawyer gag
  const blink = Math.floor(Date.now()/500) % 2 === 0;
  ctx.fillStyle = blink ? '#ffffff' : '#888888';
  ctx.font      = '15px monospace';
  ctx.fillText('PRESS SPACE TO RESUME OPERATIONS', CANVAS_W/2, CANVAS_H/2 + 94);
  ctx.fillStyle = blink ? '#aaaaaa' : '#555555';
  ctx.font      = '13px monospace';
  ctx.fillText('[ CALL A LAWYER ]', CANVAS_W/2, CANVAS_H/2 + 116);
}

// ─── Main Loop ──────────────────────────────────────────────────────────────
function render() {
  if (gameState === STATE.INTRO) {
    ctx.fillStyle = COLOR.BG;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    drawIntroScreen();
    return;
  }

  const { ox, oy } = getCameraOffset();

  ctx.fillStyle = COLOR.BG;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  drawMap(ox, oy);
  drawWindows(ox, oy);
  drawNeonSigns(ox, oy);
  drawWaypoints(ox, oy);
  drawCops(ox, oy);

  // Player car
  drawCar(CANVAS_W/2, CANVAS_H/2, Player.angle, true);

  // Park countdown ring (drawn at car center on screen)
  if (isParked) {
    drawParkCountdown(CANVAS_W/2, CANVAS_H/2 - CAR_H - 14);
  }

  // Near-cop warning flash at screen edge (parked state — visual stress)
  if (nearCopWarningTimer > 0) {
    const alpha = (nearCopWarningTimer / 30) * 0.55;
    ctx.save();
    ctx.strokeStyle = `rgba(255,0,0,${alpha})`;
    ctx.lineWidth   = 16;
    ctx.strokeRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.restore();
  }

  // ── CRT Scanlines ─────────────────────────────────────────────────────────
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  for (let y = 0; y < CANVAS_H; y += 2) {
    ctx.fillRect(0, y, CANVAS_W, 1);
  }
  ctx.restore();

  // ── Vignette ──────────────────────────────────────────────────────────────
  {
    const cx = CANVAS_W / 2, cy = CANVAS_H / 2;
    const r  = Math.max(CANVAS_W, CANVAS_H) * 0.75;
    const vg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  drawHUD();

  if (gameState === STATE.BUSTED) {
    drawBustedScreen();
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ─── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { keys[e.key] = true;  e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.key] = false; });

// ─── Bootstrap ──────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  canvas = document.getElementById('gameCanvas');
  ctx    = canvas.getContext('2d');
  initGame();
  gameState = STATE.INTRO; // Override: show intro screen before first shift
  requestAnimationFrame(loop);
});

// ─── Exported Game State ────────────────────────────────────────────────────
const Game = {
  get state()    { return gameState; },
  get earnings() { return earnings; },
  get wanted()   { return wantedLevel; },
  get dropoffs() { return dropoffs; },
  restart()      { initGame(); },
};

// Exports visible at module level: Game, Audio, Player
// Window exports: window.TILE, window.getTile, window.CopPatrolRoutes,
//                 window.NearestCopDistance, window.GameState, window.CopModes
</script>
</body>
