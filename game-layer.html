<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIGHT SHIFT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a12;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
'use strict';

// ─── Audio Stubs (Hammerz implements these) ────────────────────────────────
const Audio = {
  init() {},
  setEngineSpeed(normalizedSpeed) {}, // 0-1
  playPickup() {},
  playDropoff(earnings) {},
  setCopSiren(wantedLevel) {},        // 0-3
  startAmbience() {},
};

// ─── Constants ─────────────────────────────────────────────────────────────
const CANVAS_W = 800;
const CANVAS_H = 600;

const TILE_SIZE = 32;             // pixels per tile
const CITY_TILES = 40;            // 40×40 tile grid
const CITY_SIZE = CITY_TILES * TILE_SIZE; // 1280px

// City layout: blocks of 4 building tiles + 2 road tiles, repeating every 6
const BLOCK_SIZE = 4;             // building tiles per block
const ROAD_WIDTH = 2;             // road tiles wide
const PERIOD = BLOCK_SIZE + ROAD_WIDTH; // 6 tiles per period

// Tile types
const TILE = { ROAD: 0, BUILDING: 1, SIDEWALK: 2 };

// Colors
const COLOR = {
  ROAD:      '#1a1a2e',
  SIDEWALK:  '#2a2a3e',
  ROAD_MARK: '#ffee00',
  BG:        '#0a0a12',
};
const BUILDING_COLORS = ['#0d0d1a', '#1a0d0d', '#0d1a0d', '#1a1a0d', '#0d0d22', '#22110d'];
const NEON_COLORS     = ['#ff00aa', '#00ffee', '#aaff00', '#ff6600', '#ff0055'];

// Car physics
const CAR_W            = 16;
const CAR_H            = 28;
const MAX_SPEED        = 4.0;
const ACCELERATION     = 0.15;
const FRICTION         = 0.92;
const TURN_RATE        = 3;       // degrees per frame

// Game rules
const PICKUP_RADIUS    = 20;
const DROP_RADIUS      = 20;
const COP_CATCH_RADIUS = 20;
const MIN_DEST_DIST    = 200;
const COP_SPEED        = 2.0;
const MIN_EARNINGS     = 10;
const DROPOFF_DIST_FACTOR = 0.5;

// Wanted thresholds
const STAR_THRESHOLDS = [3, 6, 10];
const MAX_STARS       = 3;
const COP_SPAWN_DIST  = 300;

// ─── State ─────────────────────────────────────────────────────────────────
let canvas, ctx;
let map;         // 2D array of tile types
let blockColors; // color per city block
let neonSigns;   // [{x,y,w,h,color}]
let windows;     // [{x,y}] pre-baked window dots

// Player exported at top level
const Player = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  angle: 0,   // degrees, 0=up
  speed: 0,
};

let clients      = [];   // {x, y} pickup waypoints
let destination  = null; // {x, y} or null
let pickupPos    = null; // position when fare was picked up
let earnings     = 0;
let dropoffs     = 0;
let wantedLevel  = 0;
let cops         = [];   // [{x,y,vx,vy}]
let pulse        = 0;    // animation counter

// Input
const keys = {};

// Game state machine
const STATE = { PLAYING: 'PLAYING', BUSTED: 'BUSTED' };
let gameState = STATE.PLAYING;
let bustFlash = 0; // frames of red flash remaining
let audioStarted = false;

// ─── Map Generation ────────────────────────────────────────────────────────
function isRoadCol(tileX) {
  return (tileX % PERIOD) < ROAD_WIDTH;
}
function isRoadRow(tileY) {
  return (tileY % PERIOD) < ROAD_WIDTH;
}

function generateMap() {
  map = [];
  for (let y = 0; y < CITY_TILES; y++) {
    map[y] = [];
    for (let x = 0; x < CITY_TILES; x++) {
      const roadX = isRoadCol(x);
      const roadY = isRoadRow(y);
      if (roadX || roadY) {
        map[y][x] = TILE.ROAD;
      } else {
        // Check if adjacent to road (sidewalk)
        const adjRoad = isRoadCol(x-1) || isRoadCol(x+1) || isRoadRow(y-1) || isRoadRow(y+1);
        map[y][x] = adjRoad ? TILE.SIDEWALK : TILE.BUILDING;
      }
    }
  }

  // Assign colors to each city block
  blockColors = [];
  for (let by = 0; by < CITY_TILES; by++) {
    blockColors[by] = [];
    for (let bx = 0; bx < CITY_TILES; bx++) {
      // Determine block index
      const blockY = Math.floor(by / PERIOD);
      const blockX = Math.floor(bx / PERIOD);
      // Seed based on block index
      const seed = blockY * 100 + blockX;
      blockColors[by][bx] = BUILDING_COLORS[seed % BUILDING_COLORS.length];
    }
  }

  // Pre-bake building windows
  windows = [];
  const rng = mulberry32(42);
  for (let y = 0; y < CITY_TILES; y++) {
    for (let x = 0; x < CITY_TILES; x++) {
      if (map[y][x] === TILE.BUILDING) {
        // ~30% of windows lit, placed in a grid pattern within the tile
        for (let wy = 4; wy < TILE_SIZE - 4; wy += 6) {
          for (let wx = 4; wx < TILE_SIZE - 4; wx += 6) {
            if (rng() < 0.30) {
              windows.push({
                px: x * TILE_SIZE + wx,
                py: y * TILE_SIZE + wy,
                bright: rng() > 0.5,
              });
            }
          }
        }
      }
    }
  }

  // Neon signs: 2-3 on random building faces
  neonSigns = [];
  const rng2 = mulberry32(99);
  const count = 2 + Math.floor(rng2() * 2);
  for (let i = 0; i < count; i++) {
    let tx, ty;
    do {
      tx = Math.floor(rng2() * CITY_TILES);
      ty = Math.floor(rng2() * CITY_TILES);
    } while (map[ty][tx] !== TILE.BUILDING);
    neonSigns.push({
      px: tx * TILE_SIZE + 2,
      py: ty * TILE_SIZE + 2,
      w: TILE_SIZE - 4,
      h: TILE_SIZE - 4,
      color: NEON_COLORS[Math.floor(rng2() * NEON_COLORS.length)],
    });
  }
}

// Simple deterministic RNG (mulberry32)
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ─── Road Tile Helpers ──────────────────────────────────────────────────────
function isRoadTile(tileX, tileY) {
  if (tileX < 0 || tileY < 0 || tileX >= CITY_TILES || tileY >= CITY_TILES) return false;
  return map[tileY][tileX] === TILE.ROAD;
}

function randomRoadPos() {
  let tx, ty;
  do {
    tx = Math.floor(Math.random() * CITY_TILES);
    ty = Math.floor(Math.random() * CITY_TILES);
  } while (!isRoadTile(tx, ty));
  return {
    x: tx * TILE_SIZE + TILE_SIZE / 2,
    y: ty * TILE_SIZE + TILE_SIZE / 2,
  };
}

function randomRoadPosFarFrom(px, py, minDist) {
  let pos, attempts = 0;
  do {
    pos = randomRoadPos();
    attempts++;
  } while (dist(pos.x, pos.y, px, py) < minDist && attempts < 200);
  return pos;
}

// ─── Math Helpers ───────────────────────────────────────────────────────────
function dist(ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  return Math.sqrt(dx*dx + dy*dy);
}
function degToRad(d) { return d * Math.PI / 180; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ─── Collision ──────────────────────────────────────────────────────────────
function isBuildingAt(wx, wy) {
  const tx = Math.floor(wx / TILE_SIZE);
  const ty = Math.floor(wy / TILE_SIZE);
  if (tx < 0 || ty < 0 || tx >= CITY_TILES || ty >= CITY_TILES) return true;
  return map[ty][tx] === TILE.BUILDING;
}

// AABB collision check for car corners
function carOverlapsBuilding(cx, cy) {
  const hw = CAR_W / 2, hh = CAR_H / 2;
  // Sample corners (unrotated — approximate for simplicity)
  const corners = [
    [cx - hw, cy - hh],
    [cx + hw, cy - hh],
    [cx - hw, cy + hh],
    [cx + hw, cy + hh],
  ];
  return corners.some(([x, y]) => isBuildingAt(x, y));
}

// ─── Cop Spawning ───────────────────────────────────────────────────────────
function spawnCops(targetCount) {
  while (cops.length < targetCount) {
    const pos = randomRoadPosFarFrom(Player.x, Player.y, COP_SPAWN_DIST);
    cops.push({ x: pos.x, y: pos.y, vx: 0, vy: 0 });
  }
  // Remove excess cops if wanted dropped (not used currently, but defensive)
  while (cops.length > targetCount) cops.pop();
}

function updateWanted() {
  let newLevel = 0;
  for (let i = 0; i < STAR_THRESHOLDS.length; i++) {
    if (dropoffs >= STAR_THRESHOLDS[i]) newLevel = i + 1;
  }
  if (newLevel !== wantedLevel) {
    wantedLevel = newLevel;
    Audio.setCopSiren(wantedLevel);
    spawnCops(wantedLevel);
  }
}

// ─── Game Init & Reset ──────────────────────────────────────────────────────
function initGame() {
  generateMap();

  // Place player on a road tile near center
  const startPos = randomRoadPos();
  Player.x = startPos.x;
  Player.y = startPos.y;
  Player.vx = 0;
  Player.vy = 0;
  Player.angle = 0;
  Player.speed = 0;

  clients = [];
  for (let i = 0; i < 3; i++) {
    clients.push(randomRoadPosFarFrom(Player.x, Player.y, 80));
  }
  destination = null;
  pickupPos = null;
  earnings = 0;
  dropoffs = 0;
  wantedLevel = 0;
  cops = [];
  pulse = 0;
  gameState = STATE.PLAYING;
  bustFlash = 0;
}

// ─── Update ─────────────────────────────────────────────────────────────────
function update() {
  if (gameState === STATE.BUSTED) {
    if (bustFlash > 0) bustFlash--;
    if (keys[' '] || keys['Space']) {
      initGame();
    }
    return;
  }

  // Audio init on first key press
  if (!audioStarted && Object.keys(keys).some(k => keys[k])) {
    Audio.init();
    Audio.startAmbience();
    audioStarted = true;
  }

  pulse += 0.08;

  // ── Steering ──────────────────────────────────────────────────────────────
  const moving = Math.abs(Player.speed) > 0.1;
  if (moving) {
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
      Player.angle -= TURN_RATE * (Player.speed / MAX_SPEED);
    }
    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
      Player.angle += TURN_RATE * (Player.speed / MAX_SPEED);
    }
  }

  // ── Throttle ──────────────────────────────────────────────────────────────
  const angleRad = degToRad(Player.angle);
  const fwdX = Math.sin(angleRad);
  const fwdY = -Math.cos(angleRad);

  if (keys['ArrowUp'] || keys['w'] || keys['W']) {
    Player.vx += fwdX * ACCELERATION;
    Player.vy += fwdY * ACCELERATION;
  }
  if (keys['ArrowDown'] || keys['s'] || keys['S']) {
    Player.vx -= fwdX * ACCELERATION * 0.6;
    Player.vy -= fwdY * ACCELERATION * 0.6;
  }

  // ── Friction ──────────────────────────────────────────────────────────────
  Player.vx *= FRICTION;
  Player.vy *= FRICTION;

  // Clamp speed
  const spd = Math.sqrt(Player.vx * Player.vx + Player.vy * Player.vy);
  if (spd > MAX_SPEED) {
    Player.vx = (Player.vx / spd) * MAX_SPEED;
    Player.vy = (Player.vy / spd) * MAX_SPEED;
  }
  Player.speed = spd;

  // ── Collision & movement ──────────────────────────────────────────────────
  const newX = Player.x + Player.vx;
  const newY = Player.y + Player.vy;

  // Try full move
  if (!carOverlapsBuilding(newX, newY)) {
    Player.x = newX;
    Player.y = newY;
  } else {
    // Try slide X only
    if (!carOverlapsBuilding(newX, Player.y)) {
      Player.x = newX;
      Player.vy = 0;
    }
    // Try slide Y only
    else if (!carOverlapsBuilding(Player.x, newY)) {
      Player.y = newY;
      Player.vx = 0;
    } else {
      // Full stop
      Player.vx = 0;
      Player.vy = 0;
    }
  }

  // Clamp to world bounds
  Player.x = clamp(Player.x, CAR_W / 2, CITY_SIZE - CAR_W / 2);
  Player.y = clamp(Player.y, CAR_H / 2, CITY_SIZE - CAR_H / 2);

  Audio.setEngineSpeed(Player.speed / MAX_SPEED);

  // ── Pickup check ──────────────────────────────────────────────────────────
  if (!destination) {
    for (let i = clients.length - 1; i >= 0; i--) {
      if (dist(Player.x, Player.y, clients[i].x, clients[i].y) < PICKUP_RADIUS) {
        pickupPos = { x: Player.x, y: Player.y };
        clients.splice(i, 1);
        destination = randomRoadPosFarFrom(Player.x, Player.y, MIN_DEST_DIST);
        Audio.playPickup();
        break;
      }
    }
  }

  // ── Dropoff check ─────────────────────────────────────────────────────────
  if (destination) {
    if (dist(Player.x, Player.y, destination.x, destination.y) < DROP_RADIUS) {
      const traveled = pickupPos ? dist(pickupPos.x, pickupPos.y, Player.x, Player.y) : 0;
      const fare = Math.max(MIN_EARNINGS, Math.round(traveled * DROPOFF_DIST_FACTOR));
      earnings += fare;
      dropoffs++;
      Audio.playDropoff(fare);
      destination = null;
      pickupPos = null;
      // Spawn a new client
      clients.push(randomRoadPosFarFrom(Player.x, Player.y, 80));
      updateWanted();
    }
  }

  // ── Cop AI ────────────────────────────────────────────────────────────────
  for (const cop of cops) {
    const dx = Player.x - cop.x;
    const dy = Player.y - cop.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d > 0) {
      cop.vx = (dx / d) * COP_SPEED;
      cop.vy = (dy / d) * COP_SPEED;
    }
    cop.x += cop.vx;
    cop.y += cop.vy;

    // Busted!
    if (dist(cop.x, cop.y, Player.x, Player.y) < COP_CATCH_RADIUS) {
      gameState = STATE.BUSTED;
      bustFlash = 30;
      Audio.setCopSiren(0);
      return;
    }
  }
}

// ─── Rendering ──────────────────────────────────────────────────────────────
// Camera: player stays centered
function getCameraOffset() {
  return {
    ox: Math.round(Player.x - CANVAS_W / 2),
    oy: Math.round(Player.y - CANVAS_H / 2),
  };
}

function drawMap(ox, oy) {
  // Determine visible tile range
  const startTX = Math.max(0, Math.floor(ox / TILE_SIZE));
  const startTY = Math.max(0, Math.floor(oy / TILE_SIZE));
  const endTX   = Math.min(CITY_TILES - 1, Math.ceil((ox + CANVAS_W) / TILE_SIZE));
  const endTY   = Math.min(CITY_TILES - 1, Math.ceil((oy + CANVAS_H) / TILE_SIZE));

  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      const sx = tx * TILE_SIZE - ox;
      const sy = ty * TILE_SIZE - oy;
      const t  = map[ty][tx];

      if (t === TILE.ROAD) {
        ctx.fillStyle = COLOR.ROAD;
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
      } else if (t === TILE.SIDEWALK) {
        ctx.fillStyle = COLOR.SIDEWALK;
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
      } else {
        // BUILDING — use block color
        ctx.fillStyle = blockColors[ty][tx];
        ctx.fillRect(sx, sy, TILE_SIZE, TILE_SIZE);
      }
    }
  }

  // Road center line markings
  ctx.strokeStyle = COLOR.ROAD_MARK;
  ctx.lineWidth = 1;
  ctx.setLineDash([6, 10]);
  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      if (map[ty][tx] !== TILE.ROAD) continue;
      const sx = tx * TILE_SIZE - ox;
      const sy = ty * TILE_SIZE - oy;
      // Draw dashes on road center (only where road extends straight)
      const roadH = ty > 0 && map[ty-1][tx] === TILE.ROAD && ty < CITY_TILES-1 && map[ty+1][tx] === TILE.ROAD;
      const roadV = tx > 0 && map[ty][tx-1] === TILE.ROAD && tx < CITY_TILES-1 && map[ty][tx+1] === TILE.ROAD;
      if (roadH && !roadV) {
        // Vertical road — draw vertical dash in center
        ctx.beginPath();
        ctx.moveTo(sx + TILE_SIZE / 2, sy);
        ctx.lineTo(sx + TILE_SIZE / 2, sy + TILE_SIZE);
        ctx.stroke();
      } else if (roadV && !roadH) {
        // Horizontal road
        ctx.beginPath();
        ctx.moveTo(sx, sy + TILE_SIZE / 2);
        ctx.lineTo(sx + TILE_SIZE, sy + TILE_SIZE / 2);
        ctx.stroke();
      }
    }
  }
  ctx.setLineDash([]);
}

function drawWindows(ox, oy) {
  // Visible world bounds
  const wx1 = ox, wy1 = oy, wx2 = ox + CANVAS_W, wy2 = oy + CANVAS_H;
  for (const w of windows) {
    if (w.px < wx1 || w.px > wx2 || w.py < wy1 || w.py > wy2) continue;
    ctx.fillStyle = w.bright ? '#ffffcc' : '#ffee88';
    ctx.fillRect(w.px - ox, w.py - oy, 2, 2);
  }
}

function drawNeonSigns(ox, oy) {
  for (const n of neonSigns) {
    const sx = n.px - ox, sy = n.py - oy;
    if (sx + n.w < 0 || sx > CANVAS_W || sy + n.h < 0 || sy > CANVAS_H) continue;
    ctx.save();
    ctx.shadowColor = n.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = n.color + '55';
    ctx.fillRect(sx, sy, n.w, n.h);
    ctx.strokeStyle = n.color;
    ctx.lineWidth = 2;
    ctx.strokeRect(sx, sy, n.w, n.h);
    ctx.restore();
  }
}

function drawWaypoints(ox, oy) {
  const p = 0.6 + 0.4 * Math.sin(pulse);
  const r = 10 + 4 * Math.sin(pulse);

  // Client waypoints
  for (const c of clients) {
    const sx = c.x - ox, sy = c.y - oy;
    if (sx < -60 || sx > CANVAS_W + 60 || sy < -60 || sy > CANVAS_H + 60) continue;
    ctx.save();
    ctx.globalAlpha = p;
    ctx.shadowColor = '#00ff55';
    ctx.shadowBlur = 20;
    ctx.strokeStyle = '#00ff55';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
    ctx.fillStyle = '#00ff88';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('FARE', sx, sy - r - 4);
  }

  // Destination waypoint
  if (destination) {
    const sx = destination.x - ox, sy = destination.y - oy;
    if (sx >= -60 && sx <= CANVAS_W + 60 && sy >= -60 && sy <= CANVAS_H + 60) {
      ctx.save();
      ctx.globalAlpha = p;
      ctx.shadowColor = '#ffee00';
      ctx.shadowBlur = 20;
      ctx.strokeStyle = '#ffee00';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.restore();
      ctx.fillStyle = '#ffee55';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('DEST', sx, sy - r - 4);
    }
  }
}

function drawCar(cx, cy, angle, isPlayer) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(degToRad(angle));

  if (isPlayer) {
    // White body
    ctx.fillStyle = '#dddddd';
    ctx.fillRect(-CAR_W / 2, -CAR_H / 2, CAR_W, CAR_H);

    // Yellow headlights (front)
    ctx.fillStyle = '#ffee55';
    ctx.fillRect(-CAR_W / 2 + 2, -CAR_H / 2, 4, 3);
    ctx.fillRect(CAR_W / 2 - 6, -CAR_H / 2, 4, 3);

    // Red taillights (back)
    ctx.fillStyle = '#ff2200';
    ctx.fillRect(-CAR_W / 2 + 2, CAR_H / 2 - 3, 4, 3);
    ctx.fillRect(CAR_W / 2 - 6, CAR_H / 2 - 3, 4, 3);

    // Windshield
    ctx.fillStyle = '#334455';
    ctx.fillRect(-CAR_W / 2 + 3, -CAR_H / 2 + 4, CAR_W - 6, 6);
  } else {
    // Cop car — blue/white
    ctx.save();
    ctx.shadowColor = '#0088ff';
    ctx.shadowBlur = 12;
    ctx.fillStyle = '#aaccff';
    ctx.fillRect(-CAR_W / 2, -CAR_H / 2, CAR_W, CAR_H);
    ctx.restore();

    // Blue stripes
    ctx.fillStyle = '#0044cc';
    ctx.fillRect(-CAR_W / 2 + 3, -CAR_H / 2 + 4, CAR_W - 6, 5);
    ctx.fillRect(-CAR_W / 2 + 3, CAR_H / 2 - 9, CAR_W - 6, 5);

    // Siren (flashing based on pulse)
    ctx.fillStyle = Math.sin(pulse * 3) > 0 ? '#ff0000' : '#0000ff';
    ctx.fillRect(-4, -CAR_H / 2 - 3, 8, 3);
  }

  ctx.restore();
}

function drawCops(ox, oy) {
  for (const cop of cops) {
    const sx = cop.x - ox, sy = cop.y - oy;
    if (sx < -60 || sx > CANVAS_W + 60 || sy < -60 || sy > CANVAS_H + 60) continue;
    // Cop angle = toward player
    const dx = Player.x - cop.x, dy = Player.y - cop.y;
    const a = Math.atan2(dx, -dy) * 180 / Math.PI;
    drawCar(sx, sy, a, false);
  }
}

function drawHUD() {
  // Top left: earnings
  ctx.fillStyle = '#00ff55';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('$' + earnings, 14, 28);

  // Destination arrow hint (if active)
  if (destination) {
    ctx.fillStyle = '#ffee00';
    ctx.font = '11px monospace';
    const dx = destination.x - Player.x, dy = destination.y - Player.y;
    const a = Math.atan2(dx, -dy);
    const arrow = angleToArrow(a);
    ctx.fillText('DEST ' + arrow, 14, 46);
  } else if (clients.length > 0) {
    ctx.fillStyle = '#00ff88';
    ctx.font = '11px monospace';
    const c = clients[0];
    const dx = c.x - Player.x, dy = c.y - Player.y;
    const a = Math.atan2(dx, -dy);
    ctx.fillText('FARE ' + angleToArrow(a), 14, 46);
  }

  // Top right: wanted stars
  ctx.font = '22px monospace';
  ctx.textAlign = 'right';
  for (let i = 0; i < MAX_STARS; i++) {
    ctx.fillStyle = i < wantedLevel ? '#ffee00' : '#333333';
    ctx.fillText(i < wantedLevel ? '★' : '☆', CANVAS_W - 14 - (MAX_STARS - 1 - i) * 26, 28);
  }

  // Bottom left: title
  ctx.fillStyle = '#666666';
  ctx.font = '11px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('NIGHT SHIFT', 14, CANVAS_H - 14);

  // Bottom center: speed bar
  const BAR_W = 120, BAR_H = 8;
  const bx = (CANVAS_W - BAR_W) / 2;
  const by = CANVAS_H - 22;
  ctx.fillStyle = '#222233';
  ctx.fillRect(bx, by, BAR_W, BAR_H);
  const speedRatio = Player.speed / MAX_SPEED;
  const barColor = speedRatio > 0.8 ? '#ff4400' : speedRatio > 0.5 ? '#ffaa00' : '#00ff88';
  ctx.fillStyle = barColor;
  ctx.fillRect(bx, by, BAR_W * speedRatio, BAR_H);
  ctx.strokeStyle = '#444455';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, BAR_W, BAR_H);

  // Speed label
  ctx.fillStyle = '#555566';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SPD', CANVAS_W / 2, CANVAS_H - 10);
}

function angleToArrow(rad) {
  // 8 directions
  const deg = ((rad * 180 / Math.PI) + 360) % 360;
  const arrows = ['↑','↗','→','↘','↓','↙','←','↖'];
  return arrows[Math.round(deg / 45) % 8];
}

function drawBustedScreen() {
  if (bustFlash > 0) {
    ctx.fillStyle = `rgba(255,0,0,${bustFlash / 30 * 0.7})`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    return;
  }

  // Dark overlay
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.textAlign = 'center';

  // BUSTED text
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 72px monospace';
  ctx.fillText('BUSTED', CANVAS_W / 2, CANVAS_H / 2 - 40);

  // Red underline
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(CANVAS_W / 2 - 160, CANVAS_H / 2 - 26, 320, 3);

  // Earnings
  ctx.fillStyle = '#00ff55';
  ctx.font = 'bold 24px monospace';
  ctx.fillText('TOTAL EARNINGS: $' + earnings, CANVAS_W / 2, CANVAS_H / 2 + 20);

  // Restart prompt
  const blink = Math.floor(Date.now() / 500) % 2 === 0;
  ctx.fillStyle = blink ? '#ffffff' : '#888888';
  ctx.font = '16px monospace';
  ctx.fillText('PRESS SPACE TO RESTART', CANVAS_W / 2, CANVAS_H / 2 + 60);
}

// ─── Main Loop ──────────────────────────────────────────────────────────────
function render() {
  const { ox, oy } = getCameraOffset();

  // Background
  ctx.fillStyle = COLOR.BG;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Draw world
  drawMap(ox, oy);
  drawWindows(ox, oy);
  drawNeonSigns(ox, oy);
  drawWaypoints(ox, oy);
  drawCops(ox, oy);

  // Player car
  drawCar(CANVAS_W / 2, CANVAS_H / 2, Player.angle, true);

  // HUD
  drawHUD();

  // Busted overlay
  if (gameState === STATE.BUSTED) {
    drawBustedScreen();
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ─── Input ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  e.preventDefault();
});
document.addEventListener('keyup', e => {
  keys[e.key] = false;
});

// ─── Bootstrap ──────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  canvas = document.getElementById('gameCanvas');
  ctx    = canvas.getContext('2d');

  initGame();
  requestAnimationFrame(loop);
});

// ─── Exported Game State (top-level) ────────────────────────────────────────
const Game = {
  get state()    { return gameState; },
  get earnings() { return earnings; },
  get wanted()   { return wantedLevel; },
  get dropoffs() { return dropoffs; },
  restart()      { initGame(); },
};

// Exports visible at module level: Game, Audio, Player
</script>
</body>
</html>
